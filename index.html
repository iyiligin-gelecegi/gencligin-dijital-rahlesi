<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeniyet Atlası | Dijital Rahle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --altin: #c5a059; --ana-koyu: #0d0d0d; --navbar-bg: rgba(13, 13, 13, 0.98);
            --vurgu: rgba(197, 160, 89, 0.2); --text: #f0f0f0; --kart-bg: #1a1a1a;
        }
        
        body.light-mode {
            --ana-koyu: #fdfdfd; --navbar-bg: rgba(253, 253, 253, 0.98);
            --text: #1a1a1a; --kart-bg: #fff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: var(--text); background-color: var(--ana-koyu);
            overflow-x: hidden; transition: background 0.3s;
        }

        /* === NAVBAR MOBİL OPTİMİZASYONU === */
        .header-container {
            position: sticky; top: 0; width: 100%; background: var(--navbar-bg);
            border-bottom: 1px solid var(--altin); padding: 8px 10px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
        }
        .brand-box { display: flex; align-items: center; gap: 8px; }
        .site-logo { width: 35px; height: 35px; object-fit: contain; }
        .site-title { font-family: 'Cinzel', serif; color: var(--altin); font-size: 0.8rem; margin: 0; }
        
        .navbar { display: none; } /* Mobilde ana kategorileri gizleyip buton yapabiliriz ama şimdilik kalsın diyorsan aşağıda medya sorgusuyla açacağız */
        @media (min-width: 768px) {
            .navbar { display: flex; gap: 15px; }
            .site-title { font-size: 1.1rem; }
            .site-logo { width: 45px; height: 45px; }
        }

        /* === HERO === */
        .hero { 
            padding: 40px 20px; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/D691/production/_113592945_gettyimages-629536533.jpg.webp');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--altin); margin: 0; }
        .hero p { font-size: 0.95rem; color: #ddd; margin-top: 10px; }

        /* === ARAMA KUTUSU === */
        .search-container { padding: 15px; text-align: center; }
        .search-input { 
            width: 100%; max-width: 500px; padding: 12px 20px; border: 2px solid var(--altin); 
            border-radius: 25px; background: var(--kart-bg); color: var(--text); font-size: 1rem;
        }

        /* === KRONOLOJİ MOBİL DÜZENİ (BURASI KRİTİK) === */
        #time-sec { background: rgba(0,0,0,0.1); padding: 20px 0; }
        .timeline-container { position: relative; min-height: 450px; overflow: hidden; }
        .timeline-wrapper { 
            overflow-x: auto; height: 100%; padding: 20px 0 60px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .timeline-rail { position: absolute; bottom: 40px; height: 4px; background: var(--altin); }
        
        .time-box { 
            position: absolute; width: 160px; /* Mobilde daha dar kartlar */
            transition: all 0.3s;
        }
        .box-content { 
            padding: 12px; border-radius: 10px; background: var(--kart-bg);
            border: 1px solid var(--altin); font-size: 0.9rem; /* Yazılar büyüdü */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .box-content strong { display: block; margin-top: 5px; font-size: 0.95rem; line-height: 1.2; }
        .details-text { font-size: 0.85rem; margin-top: 8px; display: none; border-top: 1px dashed var(--altin); padding-top: 8px; }
        .expanded .details-text { display: block; }

        /* === KATEGORİ KARTLARI === */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 15px; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .info-card { 
            background: var(--kart-bg); border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 20px; border-radius: 15px;
        }
        .info-card h3 { color: var(--altin); font-family: 'Cinzel', serif; font-size: 1.2rem; margin-top: 0; }
        .info-card p { font-size: 1rem; line-height: 1.5; margin-bottom: 0; }

        .theme-toggle { font-size: 1.5rem; background: none; border: none; cursor: pointer; }

    </style>
</head>
<body class="dark-mode">

    <header class="header-container">
        <div class="brand-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="site-logo">
            <h1 class="site-title">MEDENİYET ATLASI</h1>
        </div>
        <button id="theme-toggle" class="theme-toggle">🌙</button>
    </header>

    <section class="hero">
        <h1>DİJİTAL RAHLE</h1>
        <p>İlmin izinde interaktif bir yolculuk.</p>
    </section>

    <div class="search-container">
        <input type="text" id="site-search" class="search-input" placeholder="Bilgin, eser veya dönem ara...">
    </div>

    <section id="time-sec">
        <h2 style="text-align:center; font-family:'Cinzel'; color:var(--altin);">Zaman Tüneli</h2>
        <p style="text-align:center; font-size:0.8rem; opacity:0.6;">← Sağa sola kaydırın, detay için kartlara tıklayın →</p>
        <div class="timeline-container">
            <div class="timeline-wrapper" id="scroll-area">
                <div class="timeline-rail" id="rail"></div>
            </div>
        </div>
    </section>

    <div id="dynamic-sections" class="container"></div>

    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";
        let allData = {};

        async function init() {
            const res = await fetch(API_URL);
            const data = await res.json();
            allData = data;
            
            renderTimeline();
            renderCategories();
        }

        function renderTimeline() {
            const rail = document.getElementById('rail');
            const startYear = 571;
            // Mobilde zoomFactor'ü biraz daha artırdım ki olaylar üst üste binmesin
            const zoomFactor = window.innerWidth < 768 ? 50 : 70; 
            
            let events = [...allData.kronoloji];
            // Kategorilerdeki tarihli verileri de tünele ekle
            allData.kategoriler.forEach(kat => {
                kat.liste.forEach(item => {
                    let y = item.ad.match(/\d{3,4}/);
                    if(y) events.push({yil: parseInt(y[0]), olay: item.ad.split('(')[0], ozet: item.ozet});
                });
            });
            events.sort((a,b) => a.yil - b.yil);

            rail.style.width = (2030 - startYear) * zoomFactor + "px";
            
            const slots = [];
            events.forEach(e => {
                const x = (e.yil - startYear) * zoomFactor;
                let lvl = 0;
                // Dikey boşluğu mobilde 70px'e düşürdüm (eskiden 100+ idi)
                while(slots[lvl]?.some(r => x < r.e && x + 180 > r.s)) lvl++;
                if(!slots[lvl]) slots[lvl] = [];
                slots[lvl].push({s: x, e: x + 180});

                const box = document.createElement('div');
                box.className = 'time-box';
                box.style.left = x + "px";
                box.style.bottom = (60 + (lvl * 85)) + "px"; // Katmanlar arası boşluk azaldı
                
                box.innerHTML = `
                    <div class="box-content" onclick="this.parentElement.classList.toggle('expanded')">
                        <span style="color:var(--altin); font-weight:800;">${e.yil}</span>
                        <strong>${e.olay}</strong>
                        <div class="details-text">${e.ozet}</div>
                    </div>
                    <div style="width:2px; height:${40 + (lvl * 85)}px; background:var(--altin); opacity:0.3; margin:auto;"></div>
                `;
                rail.appendChild(box);
            });
        }

        function renderCategories() {
            const area = document.getElementById('dynamic-sections');
            allData.kategoriler.forEach(kat => {
                const sec = document.createElement('section');
                sec.innerHTML = `<h2 style="font-family:'Cinzel'; color:var(--altin); margin-top:40px;">${kat.baslik}</h2><div class="card-grid"></div>`;
                const grid = sec.querySelector('.card-grid');
                kat.liste.forEach(item => {
                    grid.innerHTML += `
                        <div class="info-card" data-content="${item.ad.toLowerCase()} ${item.ozet.toLowerCase()}">
                            <h3>${item.ad}</h3>
                            <p>${item.ozet}</p>
                        </div>`;
                });
                area.appendChild(sec);
            });
        }

        // Arama Motoru
        document.getElementById('site-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.info-card').forEach(card => {
                card.style.display = card.dataset.content.includes(term) ? 'block' : 'none';
            });
            // Tünel filtreleme mobilde karışık olabilir, o yüzden şimdilik kartlara odaklandık
        });

        // Tema Değiştirici
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-toggle').innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        });

        init();
    </script>
</body>
</html>
