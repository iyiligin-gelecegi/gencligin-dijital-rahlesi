<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gençliğin Dijital Rahlesi | Medeniyet Atlası</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --altin: #c5a059; --ana-koyu: #0d0d0d; --navbar-bg: rgba(13, 13, 13, 0.98);
            --vurgu: rgba(197, 160, 89, 0.2);
        }
        
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: #f0f0f0;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/D691/production/_113592945_gettyimages-629536533.jpg.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        /* NAVBAR - MOBİL UYUMLU */
        .navbar {
            position: sticky; top: 0; width: 100%; background: var(--navbar-bg);
            border-bottom: 1px solid var(--altin); padding: 12px 5px; z-index: 1000;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-link {
            color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600;
            letter-spacing: 1px; transition: 0.3s; font-family: 'Cinzel', serif;
            padding: 5px 8px;
        }
        @media (min-width: 768px) {
            .nav-link { font-size: 0.85rem; padding: 5px 15px; }
            .navbar { gap: 25px; }
        }
        .nav-link:hover { color: var(--altin); text-shadow: 0 0 10px var(--altin); }

        /* HERO */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 8vw, 4rem); color: var(--altin); margin-bottom: 10px; }
        .hero p { font-size: 0.9rem; max-width: 700px; color: #ccc; font-weight: 300; line-height: 1.5; }
        @media (min-width: 768px) { .hero p { font-size: 1.1rem; } .hero { height: 65vh; } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 15px; }
        .section-title { font-family: 'Cinzel', serif; text-align: center; color: var(--altin); font-size: clamp(1.5rem, 5vw, 2.2rem); margin-bottom: 30px; }

        /* HARİTALAR DÜZENİ */
        .map-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .map-btn { 
            padding: 8px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--altin); 
            color: var(--altin); border-radius: 4px; cursor: pointer; font-size: 0.75rem; 
            font-weight: 600; transition: 0.4s;
        }
        #map-display-box { border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 8px; overflow: hidden; background: #000; position: relative; min-height: 250px; }
        #map-img { width: 100%; height: auto; display: none; }

        /* KRONOLOJİ MOBİL */
        .timeline-container { position: relative; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px 0; border: 1px solid rgba(197, 160, 89, 0.1); margin: 0 10px; }
        .scroll-hint { text-align: center; color: var(--altin); font-size: 0.7rem; margin-bottom: 10px; opacity: 0.7; }
        
        .timeline-wrapper { 
            overflow-x: auto; padding: 250px 0 80px; cursor: grab; position: relative;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .timeline-wrapper::-webkit-scrollbar { display: none; }
        
        .timeline-rail { position: relative; height: 3px; background: linear-gradient(90deg, transparent, var(--altin), transparent); margin: 0 150px; }
        
        .time-box { position: absolute; width: 200px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .box-content { 
            padding: 12px; border-radius: 8px; font-size: 0.75rem; background: #1a1a1a; 
            border: 1px solid rgba(197, 160, 89, 0.2); text-align: center; width: 180px;
        }
        .box-content.expanded { width: 260px; z-index: 100; border-color: var(--altin); position: relative; }
        .details-text { display: none; margin-top: 10px; font-size: 0.75rem; color: #bbb; line-height: 1.4; border-top: 1px solid #333; padding-top: 8px; }
        .box-content.expanded .details-text { display: block; }

        /* OKLAR MOBİLDE KÜÇÜK */
        .nav-arrows { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 5px; pointer-events: none; z-index: 50; }
        .arrow { color: var(--altin); font-size: 2rem; opacity: 0.5; pointer-events: auto; cursor: pointer; background: rgba(0,0,0,0.3); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* KATEGORİ KARTLARI MOBİL */
        .card-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        @media (min-width: 600px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1000px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }

        .info-card { 
            background: rgba(20, 20, 20, 0.7); border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 20px; border-radius: 12px; backdrop-filter: blur(10px);
        }
        .info-card h3 { font-family: 'Cinzel', serif; color: var(--altin); font-size: 1.1rem; margin: 0 0 10px; }
        .info-card p { font-size: 0.85rem; color: #ccc; line-height: 1.5; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#map-sec" class="nav-link">HARİTALAR</a>
        <a href="#time-sec" class="nav-link">KRONOLOJİ</a>
        <a href="#sahsiyetler_ve_kitaplar-sec" class="nav-link">BİLGİNLER</a>
        <a href="#kurumlar-sec" class="nav-link">KURUMLAR</a>
        <a href="#mimari-sec" class="nav-link">MİMARİ</a>
    </nav>

    <header class="hero">
        <h1>MEDENİYET ATLASI</h1>
        <p>İlmin ve hikmetin izinde, geçmişten geleceğe uzanan dijital bir keşif yolculuğu.</p>
    </header>

    <section id="map-sec" class="container">
        <h2 class="section-title">Medeniyet Coğrafyası</h2>
        <div class="map-selector" id="map-btns"></div>
        <div id="map-display-box">
            <img id="map-img" src="">
            <div id="map-hint" style="text-align:center; padding-top:100px; color:#555; font-size:0.8rem;">İncelemek için bir havza seçin.</div>
        </div>
    </section>

    <section id="time-sec">
        <h2 class="section-title">Zamanın Ruhu</h2>
        <div class="scroll-hint">← KAYDIRIN →</div>
        <div class="timeline-container">
            <div class="nav-arrows">
                <div class="arrow" onclick="scrollTimeline(-300)">‹</div>
                <div class="arrow" onclick="scrollTimeline(300)">›</div>
            </div>
            <div class="timeline-wrapper" id="scroll-area">
                <div class="timeline-rail" id="rail"></div>
            </div>
        </div>
    </section>

    <div id="dynamic-sections" class="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/medium-zoom/dist/medium-zoom.min.js"></script>
    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";

        async function init() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();
                
                // 1. Haritalar
                const mBtns = document.getElementById('map-btns');
                const mImg = document.getElementById('map-img');
                const mHint = document.getElementById('map-hint');
                const mZoom = mediumZoom('#map-img', { background: '#000', margin: 10 });

                data.harita_gorselleri.forEach((m) => {
                    const b = document.createElement('button');
                    b.className = 'map-btn'; b.innerText = m.baslik;
                    b.onclick = () => {
                        document.querySelectorAll('.map-btn').forEach(btn => btn.classList.remove('active'));
                        b.classList.add('active');
                        mHint.style.display = 'none';
                        mImg.src = m.url; mImg.style.display = 'block';
                        mZoom.detach(); mZoom.attach(mImg);
                    };
                    mBtns.appendChild(b);
                });

                // 2. Kronoloji
                const rail = document.getElementById('rail');
                const startYear = 571;
                const zoomFactor = window.innerWidth < 768 ? 25 : 40; // Mobilde daha sıkışık görünmesin
                rail.style.width = (2030 - startYear) * zoomFactor + "px";

                let events = data.kronoloji.map(k => ({...k}));
                data.kategoriler.forEach(kat => {
                    kat.liste.forEach(item => {
                        let y = item.ad.match(/\d{3,4}/);
                        if(y) events.push({yil: parseInt(y[0]), olay: item.ad.split('(')[0], ozet: item.ozet});
                    });
                });
                events.sort((a,b) => a.yil - b.yil);

                const slots = [];
                events.forEach(e => {
                    const x = (e.yil - startYear) * zoomFactor;
                    let lvl = 0;
                    while(slots[lvl]?.some(r => x < r.e && x + 200 > r.s)) lvl++;
                    if(!slots[lvl]) slots[lvl] = [];
                    slots[lvl].push({s: x, e: x + 200});

                    const h = 30 + (lvl * 100);
                    const box = document.createElement('div');
                    box.className = 'time-box'; box.style.left = x + "px"; box.style.bottom = h + "px";
                    box.innerHTML = `
                        <div class="box-content" onclick="this.classList.toggle('expanded')">
                            <span style="color:var(--altin); font-weight:bold;">${e.yil}</span><br>
                            <strong>${e.olay}</strong>
                            <div class="details-text">${e.ozet}</div>
                        </div>
                        <div style="position:absolute; bottom:-${h}px; width:8px; height:8px; background:var(--altin); border-radius:50%; left:50%; transform:translateX(-50%);"></div>
                    `;
                    rail.appendChild(box);
                });

                // 3. Kategoriler
                const dynArea = document.getElementById('dynamic-sections');
                data.kategoriler.forEach(kat => {
                    const sec = document.createElement('section');
                    sec.id = kat.id + "-sec";
                    sec.style.paddingTop = "60px";
                    sec.innerHTML = `<h2 class="section-title">${kat.baslik}</h2><div class="card-grid"></div>`;
                    const grid = sec.querySelector('.card-grid');
                    kat.liste.forEach(item => {
                        grid.innerHTML += `<div class="info-card"><h3>${item.ad}</h3><p>${item.ozet}</p></div>`;
                    });
                    dynArea.appendChild(sec);
                });

            } catch (err) { console.error("Hata:", err); }
        }

        const scrollArea = document.getElementById('scroll-area');
        function scrollTimeline(val) { scrollArea.scrollBy({ left: val, behavior: 'smooth' }); }

        // Touch Swipe Desteği (Mobil için)
        let isDown = false, startX, scrollLeft;
        scrollArea.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - scrollArea.offsetLeft; scrollLeft = scrollArea.scrollLeft; });
        scrollArea.addEventListener('touchstart', (e) => { isDown = true; startX = e.touches[0].pageX - scrollArea.offsetLeft; scrollLeft = scrollArea.scrollLeft; });
        scrollArea.addEventListener('mouseup', () => isDown = false);
        scrollArea.addEventListener('touchend', () => isDown = false);
        scrollArea.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            const x = e.pageX - scrollArea.offsetLeft;
            scrollArea.scrollLeft = scrollLeft - (x - startX) * 2;
        });
        scrollArea.addEventListener('touchmove', (e) => {
            if(!isDown) return;
            const x = e.touches[0].pageX - scrollArea.offsetLeft;
            scrollArea.scrollLeft = scrollLeft - (x - startX) * 2;
        });

        init();
    </script>
</body>
</html>
