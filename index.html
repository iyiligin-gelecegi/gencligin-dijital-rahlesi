<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gençliğin Dijital Rahlesi | Medeniyet Atlası</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --altin: #c5a059; --ana-koyu: #0d0d0d; --navbar-bg: rgba(13, 13, 13, 0.98);
            --vurgu: rgba(197, 160, 89, 0.2);
        }
        
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: #f0f0f0;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/D691/production/_113592945_gettyimages-629536533.jpg.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* NAVBAR - 5 STRATEJİK KATEGORİ */
        .navbar {
            position: sticky; top: 0; width: 100%; background: var(--navbar-bg);
            border-bottom: 1px solid var(--altin); padding: 15px 0; z-index: 1000;
            display: flex; justify-content: center; gap: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-link {
            color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 1.5px; transition: 0.3s; font-family: 'Cinzel', serif;
        }
        .nav-link:hover { color: var(--altin); text-shadow: 0 0 10px var(--altin); }

        /* HERO */
        .hero { height: 65vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 4rem); color: var(--altin); margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; max-width: 700px; color: #ccc; font-weight: 300; }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .section-title { font-family: 'Cinzel', serif; text-align: center; color: var(--altin); font-size: 2.2rem; margin-bottom: 40px; }

        /* HARİTALAR DÜZENİ */
        .map-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 30px; padding: 5px; }
        .map-btn { 
            padding: 10px 22px; background: rgba(255,255,255,0.05); border: 1px solid var(--altin); 
            color: var(--altin); border-radius: 4px; cursor: pointer; font-size: 0.85rem; 
            font-weight: 600; transition: 0.4s; font-family: 'Poppins', sans-serif;
        }
        .map-btn:hover, .map-btn.active { background: var(--altin); color: #000; box-shadow: 0 0 20px var(--vurgu); }
        #map-display-box { border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 8px; overflow: hidden; background: #000; position: relative; min-height: 400px; }
        #map-img { width: 100%; display: none; transition: transform 0.3s; }

        /* KRONOLOJİ NAVİGASYON VE ALAN */
        .timeline-container { position: relative; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 20px 0; border: 1px solid rgba(197, 160, 89, 0.1); }
        .scroll-hint { text-align: center; color: var(--altin); font-size: 0.8rem; margin-bottom: 10px; opacity: 0.7; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(10px); } }

        .timeline-wrapper { 
            overflow-x: auto; padding: 300px 0 100px; cursor: grab; position: relative;
            scrollbar-width: none; /* Firefox */
        }
        .timeline-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */
        
        .timeline-rail { position: relative; height: 3px; background: linear-gradient(90deg, transparent, var(--altin), transparent); margin: 0 300px; }
        
        /* Kart Tasarımları */
        .time-box { position: absolute; width: 240px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .box-content { 
            padding: 15px; border-radius: 8px; font-size: 0.85rem; background: #1a1a1a; 
            border: 1px solid rgba(197, 160, 89, 0.2); text-align: center; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .box-content:hover { border-color: var(--altin); transform: translateY(-5px); }
        .box-content.expanded { width: 340px; z-index: 100; border-color: var(--altin); }
        .details-text { display: none; margin-top: 10px; font-size: 0.8rem; color: #bbb; text-align: left; border-top: 1px solid #333; padding-top: 10px; }
        .box-content.expanded .details-text { display: block; }

        /* DİNAMİK KATEGORİ KARTLARI */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .info-card { 
            background: rgba(20, 20, 20, 0.7); border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 25px; border-radius: 12px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .info-card:hover { border-color: var(--altin); background: rgba(30, 30, 30, 0.9); }
        .info-card h3 { font-family: 'Cinzel', serif; color: var(--altin); margin: 0 0 12px; }
        .info-card p { font-size: 0.9rem; color: #ccc; line-height: 1.6; }

        .nav-arrows {
            position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between;
            padding: 0 20px; pointer-events: none; z-index: 50;
        }
        .arrow { 
            color: var(--altin); font-size: 3rem; opacity: 0.5; pointer-events: auto; cursor: pointer;
            text-shadow: 0 0 15px #000;
        }
        .arrow:hover { opacity: 1; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#map-sec" class="nav-link">HARİTALAR</a>
        <a href="#time-sec" class="nav-link">KRONOLOJİ</a>
        <a href="#sahsiyetler_ve_kitaplar-sec" class="nav-link">BİLGİNLER</a>
        <a href="#kurumlar-sec" class="nav-link">KURUMLAR</a>
        <a href="#mimari-sec" class="nav-link">MİMARİ</a>
    </nav>

    <header class="hero">
        <h1>MEDENİYET ATLASI</h1>
        <p>Asr-ı Saadet'ten bugüne, bilginin ve hikmetin izinde bir keşif yolculuğu. Rahleye oturun ve keşfetmeye başlayın.</p>
    </header>

    <section id="map-sec" class="container">
        <h2 class="section-title">Medeniyet Coğrafyası</h2>
        <div class="map-selector" id="map-btns"></div>
        <div id="map-display-box">
            <img id="map-img" src="">
            <div id="map-hint" style="text-align:center; padding-top:150px; color:#555;">Görüntülemek istediğiniz havzayı yukarıdan seçiniz.</div>
        </div>
    </section>

    <section id="time-sec">
        <h2 class="section-title">Zamanın Ruhu</h2>
        <div class="scroll-hint">← SAĞA VE SOLA KAYDIRIN →</div>
        <div class="timeline-container">
            <div class="nav-arrows">
                <div class="arrow" onclick="scrollTimeline(-500)">‹</div>
                <div class="arrow" onclick="scrollTimeline(500)">›</div>
            </div>
            <div class="timeline-wrapper" id="scroll-area">
                <div class="timeline-rail" id="rail"></div>
            </div>
        </div>
    </section>

    <div id="dynamic-sections" class="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/medium-zoom/dist/medium-zoom.min.js"></script>
    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";

        async function init() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();
                
                // 1. Haritalar
                const mBtns = document.getElementById('map-btns');
                const mImg = document.getElementById('map-img');
                const mHint = document.getElementById('map-hint');
                const mZoom = mediumZoom('#map-img', { background: '#000' });

                data.harita_gorselleri.forEach((m, i) => {
                    const b = document.createElement('button');
                    b.className = 'map-btn'; b.innerText = m.baslik;
                    b.onclick = () => {
                        document.querySelectorAll('.map-btn').forEach(btn => btn.classList.remove('active'));
                        b.classList.add('active');
                        mHint.style.display = 'none';
                        mImg.src = m.url; mImg.style.display = 'block';
                        mZoom.detach(); mZoom.attach(mImg);
                    };
                    mBtns.appendChild(b);
                });

                // 2. Kronoloji
                const rail = document.getElementById('rail');
                const startYear = 571;
                const zoomFactor = 40;
                rail.style.width = (2030 - startYear) * zoomFactor + "px";

                let events = data.kronoloji.map(k => ({...k, tip: 'hadise'}));
                data.kategoriler.forEach(kat => {
                    kat.liste.forEach(item => {
                        let y = item.ad.match(/\d{3,4}/);
                        if(y) events.push({yil: parseInt(y[0]), olay: item.ad.split('(')[0], ozet: item.ozet, tip: kat.id});
                    });
                });
                events.sort((a,b) => a.yil - b.yil);

                const slots = [];
                events.forEach(e => {
                    const x = (e.yil - startYear) * zoomFactor;
                    let lvl = 0;
                    while(slots[lvl]?.some(r => x < r.e && x + 250 > r.s)) lvl++;
                    if(!slots[lvl]) slots[lvl] = [];
                    slots[lvl].push({s: x, e: x + 250});

                    const h = 40 + (lvl * 110);
                    const box = document.createElement('div');
                    box.className = 'time-box'; box.style.left = x + "px"; box.style.bottom = h + "px";
                    box.innerHTML = `
                        <div class="box-content" onclick="this.classList.toggle('expanded')">
                            <span style="color:var(--altin); font-weight:bold; font-size:1rem;">${e.yil}</span><br>
                            <strong style="display:block; margin:5px 0;">${e.olay}</strong>
                            <div class="details-text">${e.ozet}</div>
                        </div>
                        <div style="position:absolute; bottom:-${h}px; width:10px; height:10px; background:var(--altin); border-radius:50%; left:50%; transform:translateX(-50%);"></div>
                        <div style="position:absolute; bottom:-${h}px; left:50%; width:1px; height:${h}px; background:var(--altin); opacity:0.3;"></div>
                    `;
                    rail.appendChild(box);
                });

                // 3. Kategoriler (Kronolojiye atmayan, kendi yerinde duran kartlar)
                const dynArea = document.getElementById('dynamic-sections');
                data.kategoriler.forEach(kat => {
                    const sec = document.createElement('section');
                    sec.id = kat.id + "-sec";
                    sec.style.paddingTop = "80px";
                    sec.innerHTML = `<h2 class="section-title">${kat.baslik}</h2><div class="card-grid"></div>`;
                    const grid = sec.querySelector('.card-grid');
                    kat.liste.forEach(item => {
                        grid.innerHTML += `<div class="info-card"><h3>${item.ad}</h3><p>${item.ozet}</p></div>`;
                    });
                    dynArea.appendChild(sec);
                });

            } catch (err) { console.error("Hata:", err); }
        }

        // Kronoloji Kaydırma Fonksiyonları
        const scrollArea = document.getElementById('scroll-area');
        function scrollTimeline(val) { scrollArea.scrollBy({ left: val, behavior: 'smooth' }); }

        let isDown = false, startX, scrollLeft;
        scrollArea.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - scrollArea.offsetLeft; scrollLeft = scrollArea.scrollLeft; });
        scrollArea.addEventListener('mouseleave', () => isDown = false);
        scrollArea.addEventListener('mouseup', () => isDown = false);
        scrollArea.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - scrollArea.offsetLeft;
            const walk = (x - startX) * 2;
            scrollArea.scrollLeft = scrollLeft - walk;
        });

        init();
    </script>
</body>
</html>
