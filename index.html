<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medeniyet Atlası | Premium Deneyim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE DESIGN ENGINE (SÜPER DEĞİŞKENLER)
        ========================================= */
        :root {
            --primary: #d4af37;
            --primary-glow: rgba(212, 175, 55, 0.4);
            --accent: #e5c158;
            --bg: #050505;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-p: #ffffff;
            --text-s: #a0a0a0;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --blur: blur(20px);
            --shd: 0 20px 40px rgba(0,0,0,0.6);
            --tr: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.light-mode {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-p: #121212;
            --text-s: #555555;
            --glass: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        /* Sıfırlama & Akış */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-p);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: calc(85px + var(--safe-bottom));
        }

        /* Arka Plan Dekorasyonu */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            pointer-events: none; z-index: -1;
        }

        /* =========================================
           2. PREMIUM NAVIGATION (APP BAR)
        ========================================= */
        .app-header {
            position: sticky; top: 0; z-index: 2000;
            padding: calc(15px + var(--safe-top)) 25px 15px;
            background: var(--glass); backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .logo-circle {
            width: 42px; height: 42px; background: var(--primary);
            border-radius: 14px; transform: rotate(-10deg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
            font-family: 'Cinzel Decorative', cursive; color: #000; font-size: 1.4rem;
        }
        .brand-name { font-family: 'Cinzel Decorative', cursive; font-size: 1.1rem; letter-spacing: 1px; color: var(--primary); }

        .theme-toggle {
            width: 45px; height: 45px; border-radius: 15px; border: none;
            background: var(--surface); color: var(--primary); cursor: pointer;
            box-shadow: var(--shd); font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
        }

        /* =========================================
           3. DİNAMİK ARAMA & KEŞİF
        ========================================= */
        .hero-section { padding: 40px 25px; text-align: left; }
        .hero-section h1 { 
            font-family: 'Playfair Display', serif; font-size: 2.8rem; line-height: 1.1; 
            margin-bottom: 15px; color: var(--text-p);
        }
        .hero-section span { color: var(--primary); font-style: italic; }

        .search-wrapper { position: relative; margin-top: 30px; }
        .search-bar {
            width: 100%; padding: 22px 65px; border-radius: 20px;
            background: var(--surface); border: 1.5px solid var(--glass-border);
            color: var(--text-p); font-size: 1.1rem; font-weight: 500;
            box-shadow: var(--shd); transition: var(--tr);
        }
        .search-bar:focus { border-color: var(--primary); transform: scale(0.98); }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; }

        /* =========================================
           4. HAVZA KARTLARI (YATAY SCROLL)
        ========================================= */
        .scroll-section { margin-top: 40px; }
        .section-label { padding: 0 25px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .section-label h2 { font-size: 1.4rem; font-weight: 800; }
        .section-label a { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 600; }

        .horizontal-scroller {
            display: flex; gap: 20px; overflow-x: auto; padding: 0 25px 30px;
            scrollbar-width: none;
        }
        .horizontal-scroller::-webkit-scrollbar { display: none; }

        .basin-card {
            flex: 0 0 280px; height: 380px; border-radius: 30px;
            position: relative; overflow: hidden; box-shadow: var(--shd);
            border: 1px solid var(--glass-border); cursor: pointer;
        }
        .basin-card img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .basin-card:active img { transform: scale(1.1); }
        .basin-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 25px; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .basin-overlay h3 { color: #fff; font-size: 1.5rem; margin-bottom: 5px; }
        .basin-overlay p { color: #ccc; font-size: 0.85rem; font-weight: 300; }

        /* =========================================
           5. KRONOLOJİ (PRO DİKEY AKIŞ)
        ========================================= */
        .timeline-container { padding: 0 25px; margin-top: 40px; }
        .timeline-entry {
            display: flex; gap: 20px; margin-bottom: 35px; position: relative;
        }
        .timeline-entry::after {
            content: ""; position: absolute; left: 22px; top: 45px; bottom: -35px;
            width: 2px; background: linear-gradient(var(--primary), transparent); opacity: 0.3;
        }
        .timeline-entry:last-child::after { display: none; }

        .t-left {
            min-width: 45px; height: 45px; background: var(--surface);
            border: 2px solid var(--primary); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 800; color: var(--primary); z-index: 2;
        }
        .t-right {
            background: var(--surface); padding: 20px; border-radius: 20px;
            border: 1px solid var(--glass-border); flex: 1; box-shadow: var(--shd);
            transition: var(--tr);
        }
        .t-right:active { transform: scale(0.96); background: var(--glass); }
        .t-right h4 { font-size: 1.1rem; margin-bottom: 8px; color: var(--primary); }
        .t-right p { font-size: 0.9rem; color: var(--text-s); }

        /* =========================================
           6. BİLGİ KARTLARI (GRID)
        ========================================= */
        .info-grid {
            display: grid; grid-template-columns: 1fr; gap: 20px; padding: 0 25px; margin-top: 30px;
        }
        .data-card {
            background: var(--surface); border-radius: 25px; padding: 25px;
            position: relative; border: 1px solid var(--glass-border);
            overflow: hidden; transition: var(--tr);
        }
        .data-card::before {
            content: "✦"; position: absolute; top: 15px; right: 20px;
            color: var(--primary); opacity: 0.2; font-size: 2rem;
        }
        .data-card h3 { font-family: 'Cinzel Decorative'; font-size: 1.3rem; margin-bottom: 12px; color: var(--primary); }
        .data-card p { font-size: 0.95rem; color: var(--text-s); line-height: 1.7; }
        .card-tag {
            display: inline-block; padding: 5px 12px; background: var(--glass);
            border-radius: 10px; font-size: 0.7rem; font-weight: 700; color: var(--primary);
            margin-bottom: 10px; text-transform: uppercase;
        }

        /* =========================================
           7. BOTTOM TAB BAR (MODERN)
        ========================================= */
        .tab-bar {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            height: 70px; background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(25px); border-radius: 25px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid var(--glass-border); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            z-index: 3000;
        }
        body.light-mode .tab-bar { background: rgba(255, 255, 255, 0.85); }

        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-s); text-decoration: none; font-size: 0.65rem;
            font-weight: 700; transition: 0.3s;
        }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 1.6rem; margin-bottom: 3px; }

        /* Modal / Detail View */
        .detail-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 4000; display: none;
            padding: calc(40px + var(--safe-top)) 25px; overflow-y: auto;
        }
        .close-detail {
            position: fixed; top: 20px; right: 25px; width: 45px; height: 45px;
            background: var(--surface); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.6s ease forwards; }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header class="app-header">
        <div class="brand-logo">
            <div class="logo-circle">M</div>
            <h1 class="brand-name">ATLAS.pro</h1>
        </div>
        <button id="theme-btn" class="theme-toggle">🌙</button>
    </header>

    <section class="hero-section">
        <h1 class="animate">Geçmişin <span>Işığında</span> Geleceği İnşa Et.</h1>
        <div class="search-wrapper animate" style="animation-delay: 0.2s;">
            <span class="search-icon">🔍</span>
            <input type="text" id="main-search" class="search-bar" placeholder="Kayıp hazineleri ara...">
        </div>
    </section>

    <section id="havzalar" class="scroll-section animate" style="animation-delay: 0.3s;">
        <div class="section-label">
            <h2>Medeniyet Havzaları</h2>
            <a href="#">Tümünü Gör</a>
        </div>
        <div class="horizontal-scroller" id="map-tabs-container">
            </div>
    </section>

    <section id="akış" class="timeline-container animate" style="animation-delay: 0.4s;">
        <div class="section-label" style="padding:0; margin-bottom:25px;">
            <h2>Tarihin Akışı</h2>
        </div>
        <div id="vertical-timeline">
            </div>
    </section>

    <section id="kesfet" style="margin-top:40px;">
        <div class="section-label">
            <h2>Bilgelik Hazinesi</h2>
        </div>
        <div class="info-grid" id="data-root">
            </div>
    </section>

    <nav class="tab-bar">
        <a href="#havzalar" class="tab-item active">
            <span class="tab-icon">🏺</span>
            <span>Havzalar</span>
        </a>
        <a href="#akış" class="tab-item">
            <span class="tab-icon">⏳</span>
            <span>Akış</span>
        </a>
        <a href="#kesfet" class="tab-item">
            <span class="tab-icon">💎</span>
            <span>Keşfet</span>
        </a>
    </nav>

    <div id="detail-panel" class="detail-panel">
        <button class="close-detail" onclick="closeDetail()">✕</button>
        <div id="detail-content"></div>
    </div>

    <script>
        const API_ENDPOINT = "https://api.npoint.io/c55382ed5004a784e99b";
        let store = null;

        // 1. ENGINE START
        async function boot() {
            try {
                const res = await fetch(API_ENDPOINT);
                store = await res.json();
                
                renderBasins();
                renderTimeline();
                renderCards();
                initSearch();
                initInteractions();
            } catch (e) {
                console.error("Boot Error:", e);
            }
        }

        // 2. HAVZA KARTLARI (YATAY)
        function renderBasins() {
            const container = document.getElementById('map-tabs-container');
            store.harita_gorselleri.forEach(m => {
                const el = document.createElement('div');
                el.className = 'basin-card';
                el.innerHTML = `
                    <img src="${m.url}" alt="${m.baslik}">
                    <div class="basin-overlay">
                        <p>Medeniyet Merkezi</p>
                        <h3>${m.baslik}</h3>
                    </div>
                `;
                el.onclick = () => openDetail(m.baslik, "Bu bölge İslam medeniyetinin temel taşlarından biridir. Detaylı harita ve mimari veriler analiz edilmektedir.");
                container.appendChild(el);
            });
        }

        // 3. KRONOLOJİ (DİKEY)
        function renderTimeline() {
            const root = document.getElementById('vertical-timeline');
            let events = [...store.kronoloji];
            
            // Veri birleştirme ve temizleme
            store.kategoriler.forEach(k => {
                k.liste.forEach(l => {
                    let y = l.ad.match(/\d{3,4}/);
                    if(y) events.push({yil: y[0], olay: l.ad.split('(')[0], ozet: l.ozet});
                });
            });
            events.sort((a,b) => a.yil - b.yil).slice(0, 15); // İlk 15 önemli olay

            events.forEach((ev, i) => {
                const div = document.createElement('div');
                div.className = 'timeline-entry';
                div.style.animationDelay = (0.1 * i) + 's';
                div.innerHTML = `
                    <div class="t-left">${ev.yil}</div>
                    <div class="t-right">
                        <h4>${ev.olay}</h4>
                        <p>${ev.ozet.substring(0, 80)}...</p>
                    </div>
                `;
                root.appendChild(div);
            });
        }

        // 4. BİLGİ GRID
        function renderCards() {
            const root = document.getElementById('data-root');
            store.kategoriler.forEach(kat => {
                kat.liste.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'data-card animate';
                    card.setAttribute('data-keywords', (item.ad + item.ozet).toLowerCase());
                    card.innerHTML = `
                        <span class="card-tag">${kat.baslik}</span>
                        <h3>${item.ad}</h3>
                        <p>${item.ozet}</p>
                    `;
                    card.onclick = () => openDetail(item.ad, item.ozet);
                    root.appendChild(card);
                });
            });
        }

        // 5. SEARCH ENGINE
        function initSearch() {
            const input = document.getElementById('main-search');
            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                document.querySelectorAll('.data-card').forEach(c => {
                    const match = c.getAttribute('data-keywords').includes(val);
                    c.style.display = match ? 'block' : 'none';
                });
            });
        }

        // 6. TEMA VE ETKİLEŞİM
        function initInteractions() {
            const tBtn = document.getElementById('theme-btn');
            tBtn.onclick = () => {
                document.body.classList.toggle('light-mode');
                tBtn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            };

            // Tab bar aktiflik kontrolü
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(tab => {
                tab.onclick = () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                };
            });
        }

        // DETAIL PANEL LOGIC
        function openDetail(title, text) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <h2 style="font-family:'Playfair Display'; font-size:2.5rem; color:var(--primary); margin-bottom:20px;">${title}</h2>
                <div style="width:50px; height:4px; background:var(--primary); margin-bottom:30px;"></div>
                <p style="font-size:1.2rem; color:var(--text-p); line-height:1.8;">${text}</p>
                <div style="margin-top:40px; padding:20px; border-radius:20px; background:var(--surface); border:1px solid var(--glass-border);">
                    <h4 style="color:var(--primary); margin-bottom:10px;">💡 Bilgi Notu</h4>
                    <p style="font-size:0.9rem; color:var(--text-s);">Bu içerik Medeniyet Atlası veri bankasından otomatik olarak derlenmiştir.</p>
                </div>
            `;
            panel.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detail-panel').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // START THE ENGINE
        boot();

    </script>
</body>
</html>
