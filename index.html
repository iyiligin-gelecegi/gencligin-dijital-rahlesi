<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeniyet Atlası | Dijital Rahle</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-bright: #e2c286;
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a; /* Kart arka planı biraz daha belirgin */
            --text-main: #f0f0f0;
            --text-dim: #b0b0b0;
            --accent: rgba(197, 160, 89, 0.15);
            --nav-height: 70px;
        }

        body.light-mode {
            --bg-dark: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #444444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 1. NAVİGASYON */
        .header {
            position: fixed; top: 0; width: 100%; height: var(--nav-height);
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .logo-text { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.9rem; }

        /* 2. HARİTA (Mobil Uyumlu) */
        .map-viewer-box {
            position: relative; border-radius: 12px; overflow: hidden;
            background: #000; min-height: 250px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--gold);
        }
        #main-map-img { width: 100%; height: auto; object-fit: contain; max-height: 80vh; }

        .map-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
        .map-tab-btn { white-space: nowrap; padding: 8px 16px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 20px; font-size: 0.8rem; }
        .map-tab-btn.active { background: var(--gold); color: #000; }

        /* 3. KRONOLOJİ (Gelişmiş) */
        .chronology-section { background: #000; padding: 60px 0; overflow: hidden; position: relative; }
        
        .timeline-viewport {
            width: 100%; height: 500px; overflow-x: auto; cursor: grab;
            position: relative; scrollbar-width: thin;
        }
        
        .timeline-container { 
            position: absolute; top: 50%; height: 4px; background: var(--gold); 
            transition: width 0.3s ease;
        }
        
        /* Cetvel Yılları */
        .ruler-year {
            position: absolute; top: 15px; transform: translateX(-50%);
            font-size: 10px; color: var(--gold-bright); font-weight: bold;
            border-left: 1px solid rgba(197, 160, 89, 0.3); padding-left: 3px; height: 20px;
        }

        .timeline-item {
            position: absolute; width: 200px; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.3s;
        }
        .timeline-item.up { bottom: 30px; }
        .timeline-item.down { top: 30px; flex-direction: column-reverse; }

        .timeline-card {
            background: var(--bg-card); border: 1.5px solid var(--gold); padding: 12px;
            border-radius: 10px; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .timeline-card h4 { color: var(--gold); font-size: 0.8rem; margin: 5px 0; }
        
        /* Özet Bilgi Görünürlüğü (Fix) */
        .long-desc { 
            max-height: 0; overflow: hidden; transition: 0.3s; 
            font-size: 0.75rem; color: #fff; /* Yazı rengi beyaz yapıldı */
            background: rgba(255,255,255,0.05); border-radius: 4px;
        }
        .timeline-item.active .long-desc { 
            max-height: 150px; margin-top: 8px; padding: 8px; border-top: 1px solid var(--gold); 
        }

        /* Peygamber Efendimiz Özel Vurgu */
        .special-event { border: 2px solid #fff !important; box-shadow: 0 0 15px #fff !important; }

        .connector-line { width: 1px; background: var(--gold); height: 50px; opacity: 0.6; }

        /* Zoom Kontrol */
        .zoom-ui { position: absolute; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .z-btn { background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-text">MEDENİYET ATLASI</div>
        <button id="theme-btn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🌙</button>
    </header>

    <div style="height: var(--nav-height);"></div>

    <section id="map-section" class="container">
        <div class="map-tabs" id="map-tabs-container"></div>
        <div class="map-viewer-box">
            <img id="main-map-img" src="" alt="Harita Yükleniyor...">
        </div>
    </section>

    <section class="chronology-section">
        <div class="zoom-ui">
            <button class="z-btn" onclick="adjustZoom(1.2)">+</button>
            <button class="z-btn" onclick="adjustZoom(0.8)">-</button>
        </div>
        <div class="timeline-viewport" id="swipe-area">
            <div id="timeline-rail" class="timeline-container"></div>
        </div>
    </section>

    <section id="content-section" class="container">
        <div id="dynamic-content-root"></div>
    </section>

    <script>
        const ATLAS_API = "https://api.npoint.io/c55382ed5004a784e99b";
        let rawData = null;
        let currentZoom = 60; // Her yıl kaç piksel?
        const START_Y = 571;
        const END_Y = 2026;

        // Pinch-to-zoom değişkenleri
        let initialDist = -1;

        async function bootApp() {
            try {
                const response = await fetch(ATLAS_API);
                rawData = await response.json();
                initMaps();
                initChronology();
                initTheme();
                initTouchEvents();
            } catch (e) { console.error("Veri yüklenemedi"); }
        }

        function initMaps() {
            const tabs = document.getElementById('map-tabs-container');
            const mapImg = document.getElementById('main-map-img');
            rawData.harita_gorselleri.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `map-tab-btn ${i === 0 ? 'active' : ''}`;
                btn.innerText = m.baslik;
                if(i===0) mapImg.src = m.url;
                btn.onclick = () => {
                    document.querySelectorAll('.map-tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    mapImg.src = m.url;
                };
                tabs.appendChild(btn);
            });
        }

        function initChronology() {
            const rail = document.getElementById('timeline-rail');
            rail.innerHTML = '';
            const totalWidth = (END_Y - START_Y) * currentZoom;
            rail.style.width = totalWidth + (window.innerWidth) + "px";

            // 1. Cetvel (Her yıl çizgisi ve 5 yılda bir yazı)
            for (let y = START_Y; y <= END_Y; y++) {
                const x = (y - START_Y) * currentZoom;
                const ruler = document.createElement('div');
                ruler.className = 'ruler-year';
                ruler.style.left = x + "px";
                // Sadece zoom seviyesi yeterliyse veya 10 yılda bir tarihi yaz
                if (currentZoom > 40 || y % 10 === 0) {
                    ruler.innerText = y;
                }
                rail.appendChild(ruler);
            }

            // 2. Olayları Yerleştir
            let events = [...(rawData.kronoloji || [])];
            events.sort((a,b) => a.yil - b.yil);

            events.forEach((ev, i) => {
                const x = (ev.yil - START_Y) * currentZoom;
                const isProphet = ev.yil === 571;
                const side = (i % 2 === 0) ? 'up' : 'down';
                
                const item = document.createElement('div');
                item.className = `timeline-item ${side}`;
                item.style.left = x + "px";
                
                item.innerHTML = `
                    <div class="timeline-card ${isProphet ? 'special-event' : ''}" onclick="toggleCard(this)">
                        <span style="font-weight:bold; color:var(--gold); font-size:0.7rem;">${ev.yil}</span>
                        <h4>${ev.olay}</h4>
                        <div class="long-desc">${ev.ozet || 'Detaylı bilgi yakında eklenecektir.'}</div>
                    </div>
                    <div class="connector-line"></div>
                `;
                rail.appendChild(item);
            });
        }

        function toggleCard(el) {
            el.parentElement.classList.toggle('active');
        }

        function adjustZoom(factor) {
            currentZoom = Math.max(10, Math.min(300, currentZoom * factor));
            initChronology();
        }

        function initTouchEvents() {
            const area = document.getElementById('swipe-area');
            
            // İki parmakla zoom (Pinch)
            area.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    let dist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    if (initialDist > 0) {
                        if (dist > initialDist) adjustZoom(1.05);
                        else adjustZoom(0.95);
                    }
                    initialDist = dist;
                }
            }, {passive: true});

            area.addEventListener('touchend', () => { initialDist = -1; });
        }

        function initTheme() {
            const btn = document.getElementById('theme-btn');
            btn.onclick = () => {
                document.body.classList.toggle('light-mode');
                btn.innerText = document.body.classList.contains('light-mode') ? "☀️" : "🌙";
            };
        }

        bootApp();
    </script>
</body>
</html>
