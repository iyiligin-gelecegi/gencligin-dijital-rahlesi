<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medeniyet Atlası | Çü İyiliğin Geleceği</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. DEĞİŞKENLER VE MASTER STİL
        ========================================= */
        :root {
            --gold: #c5a059;
            --gold-light: #e2c286;
            --bg: #070707;
            --card: #121212;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: rgba(197, 160, 89, 0.1);
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body.light-mode {
            --bg: #fdfdfd;
            --card: #ffffff;
            --text: #111111;
            --text-dim: #555555;
            --accent: rgba(197, 160, 89, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.6s ease;
        }

        /* =========================================
           2. HEADER (YENİ LOGO VE METİN)
        ========================================= */
        .header {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(7, 7, 7, 0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--gold); z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        body.light-mode .header { background: rgba(253, 253, 253, 0.9); }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid var(--gold); background: #fff; }
        .logo-title { font-family: 'Cinzel', serif; line-height: 1.1; }
        .logo-main { color: var(--gold); font-size: 0.9rem; font-weight: 900; display: block; }
        .logo-sub { color: var(--text); font-size: 0.65rem; letter-spacing: 1px; }

        .theme-btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .theme-btn:hover { background: var(--gold); color: #000; }

        /* =========================================
           3. HERO & SEARCH
        ========================================= */
        .hero {
            padding: 120px 25px 60px; text-align: center;
            background: radial-gradient(circle at center, var(--accent), transparent);
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 20px; font-weight: 900; }
        
        .search-area { max-width: 600px; margin: 0 auto; position: relative; }
        .search-input {
            width: 100%; padding: 18px 25px; border-radius: 50px;
            border: 1px solid var(--gold); background: var(--card);
            color: var(--text); font-size: 1rem; transition: var(--transition);
        }
        .search-input:focus { outline: none; box-shadow: 0 0 30px var(--accent); transform: scale(1.02); }

        /* =========================================
           4. HARİTA PANELİ (BİRİ AÇIK GELİR)
        ========================================= */
        .section-title { text-align: center; margin: 50px 0 30px; font-family: 'Cinzel'; color: var(--gold); }
        
        .map-frame {
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
        }
        .map-tabs {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px;
            justify-content: flex-start; scrollbar-width: none;
        }
        .map-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            padding: 10px 18px; border-radius: 12px; border: 1px solid var(--accent);
            background: var(--card); color: var(--text-dim); white-space: nowrap;
            cursor: pointer; transition: var(--transition); font-weight: 600; font-size: 0.85rem;
        }
        .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .map-view {
            width: 100%; height: 450px; background: #000; border-radius: 20px;
            overflow: hidden; border: 1px solid var(--gold); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #atlas-map { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s ease; }

        /* =========================================
           5. TAM KRONOLOJİ (YIL YIL CETVEL)
        ========================================= */
        .chrono-wrap {
            margin: 80px 0; background: var(--accent); padding: 40px 0;
            position: relative; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
        }
        .chrono-viewport {
            overflow-x: auto; padding: 250px 0 100px; cursor: grab;
            scrollbar-width: none; position: relative;
        }
        .chrono-viewport::-webkit-scrollbar { display: none; }

        .chrono-line {
            position: relative; height: 4px; background: var(--gold);
            margin: 0 100px; border-radius: 2px;
        }

        /* Yıl yazıları (Her yıl için) */
        .year-mark {
            position: absolute; top: 15px; transform: translateX(-50%);
            font-size: 0.6rem; color: var(--gold); font-weight: bold;
            opacity: 0.4;
        }
        .year-mark.major { opacity: 1; font-size: 0.8rem; top: 20px; }

        .event-node {
            position: absolute; width: 220px; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        .event-card {
            background: var(--card); border: 1.5px solid var(--gold);
            padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: pointer; transition: var(--transition); z-index: 5;
        }
        .event-card:hover { transform: translateY(-10px); background: var(--gold); }
        .event-card:hover * { color: #000 !important; }

        .event-card h4 { font-size: 0.85rem; margin-bottom: 5px; color: var(--gold); }
        .event-year { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
        .event-detail { max-height: 0; overflow: hidden; transition: 0.4s ease; font-size: 0.75rem; color: var(--text-dim); }
        .event-node.active .event-detail { max-height: 150px; margin-top: 10px; border-top: 1px solid var(--accent); padding-top: 8px; }

        .connector { width: 1.5px; background: var(--gold); opacity: 0.6; }

        /* =========================================
           6. BİLGİ KARTLARI
        ========================================= */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; padding: 40px 20px; max-width: 1200px; margin: 0 auto;
        }
        .card {
            background: var(--card); border: 1px solid var(--accent);
            padding: 25px; border-radius: 20px; transition: var(--transition);
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card h3 { color: var(--gold); font-family: 'Cinzel'; margin-bottom: 12px; font-size: 1.2rem; }
        .card p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .map-view { height: 300px; }
            .logo-sub { font-size: 0.55rem; }
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="logo-img">
            <div class="logo-title">
                <span class="logo-main">MEDENİYET ATLASI</span>
                <span class="logo-sub">Çü İyiliğin Geleceği Kulübü</span>
            </div>
        </div>
        <button id="theme-trigger" class="theme-btn">🌙</button>
    </header>

    <section class="hero">
        <h1>Geçmişin İzi,<br>Geleceğin Bilgisi.</h1>
        <div class="search-area">
            <input type="text" id="atlas-search" class="search-input" placeholder="Bilgin, şehir veya olay arayın...">
        </div>
    </section>

    <section id="coğrafya" class="map-frame">
        <h2 class="section-title">Medeniyet Havzaları</h2>
        <div id="map-tabs" class="map-tabs"></div>
        <div class="map-view">
            <img id="atlas-map" src="">
        </div>
    </section>

    <section class="chrono-wrap">
        <h2 class="section-title">Zamanın Akışı</h2>
        <div class="chrono-viewport" id="scroll-engine">
            <div id="chrono-rail" class="chrono-line">
                </div>
        </div>
    </section>

    <div id="content-root" class="grid"></div>

    <script>
        const API = "https://api.npoint.io/c55382ed5004a784e99b";
        let atlasData = null;

        async function start() {
            const res = await fetch(API + "?v=" + Date.now());
            atlasData = await res.json();
            
            renderMaps();
            renderChronology();
            renderGrid();
            setupSearch();
            setupTheme();
            setupDrag();
        }

        // 1. HARİTALAR (İLKİ AÇIK GELİR)
        function renderMaps() {
            const container = document.getElementById('map-tabs');
            const img = document.getElementById('atlas-map');

            atlasData.harita_gorselleri.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${i === 0 ? 'active' : ''}`;
                btn.innerText = m.baslik;
                
                // İlk haritayı set et
                if(i === 0) img.src = m.url;

                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    img.style.opacity = '0';
                    setTimeout(() => {
                        img.src = m.url;
                        img.style.opacity = '1';
                    }, 300);
                };
                container.appendChild(btn);
            });
        }

        // 2. TAM KRONOLOJİ (571 - 2026 ARASI TÜM YILLAR)
        function renderChronology() {
            const rail = document.getElementById('chrono-rail');
            const start = 571, end = 2026, gap = 60; // Her yıl arası 60px

            rail.style.width = (end - start) * gap + "px";

            // Yıl cetvelini oluştur
            for(let y = start; y <= end; y++) {
                const x = (y - start) * gap;
                const mark = document.createElement('div');
                mark.className = `year-mark ${y % 10 === 0 ? 'major' : ''}`;
                mark.style.left = x + "px";
                mark.innerText = y;
                rail.appendChild(mark);
            }

            // Olayları yerleştir
            let events = [...atlasData.kronoloji];
            atlasData.kategoriler.forEach(k => {
                k.liste.forEach(item => {
                    let yMatch = item.ad.match(/\d{3,4}/);
                    if(yMatch) events.push({yil: parseInt(yMatch[0]), olay: item.ad.split('(')[0], ozet: item.ozet});
                });
            });

            // Çakışma önleyici dikey slot sistemi
            const slots = [];
            events.sort((a,b) => a.yil - b.yil).forEach(ev => {
                const x = (ev.yil - start) * gap;
                let level = 0;
                while(slots[level] && slots[level] > x - 150) level++;
                slots[level] = x + 150;

                const node = document.createElement('div');
                node.className = 'event-node';
                node.style.left = x + "px";
                
                const vDist = 60 + (level * 100);
                node.style.bottom = "0px";
                node.style.transform = `translate(-50%, -${vDist}px)`;

                node.innerHTML = `
                    <div class="event-card" onclick="this.parentElement.classList.toggle('active')">
                        <span class="event-year">${ev.yil}</span>
                        <h4>${ev.olay}</h4>
                        <div class="event-detail">${ev.ozet}</div>
                    </div>
                    <div class="connector" style="height:${vDist}px"></div>
                `;
                rail.appendChild(node);
            });
        }

        // 3. İÇERİK IZGARASI
        function renderGrid() {
            const root = document.getElementById('content-root');
            atlasData.kategoriler.forEach(cat => {
                cat.liste.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.text = (item.ad + item.ozet).toLowerCase();
                    card.innerHTML = `<h3>${item.ad}</h3><p>${item.ozet}</p>`;
                    root.appendChild(card);
                });
            });
        }

        // 4. ARAMA MOTORU
        function setupSearch() {
            const input = document.getElementById('atlas-search');
            input.oninput = (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.card').forEach(c => {
                    c.style.display = c.dataset.text.includes(term) ? 'block' : 'none';
                });
                document.querySelectorAll('.event-node').forEach(n => {
                    n.style.opacity = n.innerText.toLowerCase().includes(term) ? '1' : '0.1';
                });
            };
        }

        // 5. TEMA VE KAYDIRMA
        function setupTheme() {
            const btn = document.getElementById('theme-trigger');
            btn.onclick = () => {
                document.body.classList.toggle('light-mode');
                btn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            };
        }

        function setupDrag() {
            const el = document.getElementById('scroll-engine');
            let isDown = false, startX, scrollLeft;
            el.onmousedown = (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; };
            el.onmouseleave = () => isDown = false;
            el.onmouseup = () => isDown = false;
            el.onmousemove = (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - el.offsetLeft;
                el.scrollLeft = scrollLeft - (x - startX) * 2;
            };
        }

        start();
    </script>
</body>
</html>
