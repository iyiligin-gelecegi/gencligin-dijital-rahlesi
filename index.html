<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas | Mobil Medeniyet Rehberi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. MOBİL SİSTEM DEĞİŞKENLERİ
        ========================================= */
        :root {
            --gold: #d4af37;
            --gold-soft: #c5a059;
            --bg: #000000;
            --card-bg: #121212;
            --text: #ffffff;
            --text-gray: #a0a0a0;
            --safe-area-bottom: env(safe-area-inset-bottom);
            --nav-height: 65px;
            --accent-gradient: linear-gradient(135deg, #d4af37 0%, #8a6d3b 100%);
        }

        body.light-mode {
            --bg: #ffffff;
            --card-bg: #f2f2f7;
            --text: #000000;
            --text-gray: #666666;
        }

        /* Temel Sıfırlama */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: calc(var(--nav-height) + 20px + var(--safe-area-bottom));
            overflow-x: hidden;
            user-select: none;
            transition: background 0.3s ease;
        }

        /* =========================================
           2. MOBİL ÜST BAR (LOGO & TEMA)
        ========================================= */
        .top-bar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        body.light-mode .top-bar { background: rgba(255,255,255,0.8); }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); }
        .brand-name { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); font-weight: 900; }

        .theme-btn { 
            background: var(--card-bg); border: none; color: var(--gold);
            width: 38px; height: 38px; border-radius: 12px; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* =========================================
           3. MOBİL ALT NAVİGASYON (APP BAR)
        ========================================= */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: calc(var(--nav-height) + var(--safe-area-bottom));
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-area-bottom); z-index: 2000;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }
        body.light-mode .bottom-nav { background: rgba(242, 242, 247, 0.95); }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-gray); text-decoration: none; font-size: 0.7rem;
            font-weight: 600; gap: 4px; flex: 1;
        }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 1.4rem; }

        /* =========================================
           4. ARAMA & HERO (MOBİL ODAKLI)
        ========================================= */
        .search-container { padding: 20px; }
        .search-box {
            background: var(--card-bg); border: 1.5px solid var(--gold-soft);
            border-radius: 15px; display: flex; align-items: center; padding: 12px 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .search-box input {
            background: none; border: none; color: var(--text);
            width: 100%; font-size: 1rem; outline: none; margin-left: 10px;
        }

        /* =========================================
           5. HARİTA HAVZALARI (MOBİL SLIDER)
        ========================================= */
        .section-title { padding: 0 20px 15px; font-family: 'Cinzel'; color: var(--gold); font-size: 1.4rem; }
        
        .map-tabs-wrapper {
            overflow-x: auto; white-space: nowrap; padding: 0 20px 20px;
            scrollbar-width: none;
        }
        .map-tabs-wrapper::-webkit-scrollbar { display: none; }

        .map-chip {
            display: inline-block; padding: 10px 20px; background: var(--card-bg);
            border-radius: 25px; margin-right: 10px; border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--text-gray); font-weight: 600; font-size: 0.85rem;
        }
        .map-chip.active { background: var(--accent-gradient); color: #000; border-color: var(--gold); }

        .map-display-area {
            margin: 0 20px; border-radius: 20px; height: 230px;
            background: #000; overflow: hidden; position: relative;
            border: 1px solid var(--gold-soft);
        }
        #mobile-map-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .map-hint { 
            position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6);
            padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; color: #fff;
        }

        /* =========================================
           6. KRONOLOJİ (DİKEY MOBİL TASARIM)
        ========================================= */
        .timeline-vertical { padding: 20px; position: relative; }
        .timeline-vertical::before {
            content: ""; position: absolute; left: 30px; top: 0; bottom: 0;
            width: 2px; background: var(--gold-soft); opacity: 0.3;
        }

        .t-item {
            position: relative; padding-left: 45px; margin-bottom: 30px;
        }
        .t-dot {
            position: absolute; left: 26px; top: 5px; width: 10px; height: 10px;
            background: var(--gold); border-radius: 50%; border: 3px solid var(--bg);
            z-index: 2;
        }
        .t-year { font-family: 'Cinzel'; font-weight: 900; color: var(--gold); font-size: 1.1rem; margin-bottom: 4px; display: block; }
        .t-card {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .t-card h4 { font-size: 1rem; margin-bottom: 5px; color: var(--text); }
        .t-card p { font-size: 0.85rem; color: var(--text-gray); line-height: 1.4; }

        /* =========================================
           7. BİLGİ KARTLARI (TAM GENİŞLİK MOBİL)
        ========================================= */
        .mobile-grid { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .m-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border-left: 5px solid var(--gold); position: relative;
            animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .m-card h3 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold); margin-bottom: 8px; }
        .m-card p { font-size: 0.95rem; line-height: 1.6; color: var(--text-gray); }

        /* No Result State */
        .empty-state { text-align: center; padding: 40px; color: var(--text-gray); display: none; }

    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="brand-img" alt="Logo">
            <h1 class="brand-name">ATLAS</h1>
        </div>
        <button id="theme-trigger" class="theme-btn">🌙</button>
    </header>

    <div class="search-container">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="mobile-search" placeholder="Bilgin, şehir veya yıl ara...">
        </div>
    </div>

    <section id="coğrafya">
        <h2 class="section-title">Medeniyet Havzaları</h2>
        <div class="map-tabs-wrapper" id="map-tabs">
            </div>
        <div class="map-display-area">
            <img id="mobile-map-img" src="" alt="Atlas Haritası">
            <div id="map-loader" style="color:#555; text-align:center; padding-top:100px;">Bir havza seçin...</div>
            <div class="map-hint">Tam ekran için dokun</div>
        </div>
    </section>

    <section id="zaman" style="margin-top:40px;">
        <h2 class="section-title">Zamanın İzleri</h2>
        <div class="timeline-vertical" id="vertical-timeline">
            </div>
    </section>

    <section id="kesfet" style="margin-top:20px;">
        <h2 class="section-title">Medeniyet Hazinesi</h2>
        <div class="mobile-grid" id="content-root">
            </div>
        <div id="no-res" class="empty-state">Aradığınız kriterde bilgi bulunamadı.</div>
    </section>

    <nav class="bottom-nav">
        <a href="#coğrafya" class="nav-item active" onclick="updateNav(this)">
            <span class="nav-icon">🌍</span>
            <span>Havzalar</span>
        </a>
        <a href="#zaman" class="nav-item" onclick="updateNav(this)">
            <span class="nav-icon">⏳</span>
            <span>Zaman</span>
        </a>
        <a href="#kesfet" class="nav-item" onclick="updateNav(this)">
            <span class="nav-icon">📜</span>
            <span>Keşfet</span>
        </a>
    </nav>

    <script>
        const API = "https://api.npoint.io/c55382ed5004a784e99b";
        let atlasData = null;

        // 1. UYGULAMA BAŞLANGICI
        async function startMobileApp() {
            try {
                const res = await fetch(API);
                atlasData = await res.json();
                
                renderMaps();
                renderTimeline();
                renderContent();
                handleSearch();
                handleTheme();
            } catch (err) {
                console.error("Yükleme hatası:", err);
            }
        }

        // 2. MOBİL HARİTA ÇİPLERİ VE GÖRÜNTÜLEME
        function renderMaps() {
            const container = document.getElementById('map-tabs');
            const img = document.getElementById('mobile-map-img');
            const loader = document.getElementById('map-loader');

            atlasData.harita_gorselleri.forEach((m, i) => {
                const chip = document.createElement('div');
                chip.className = 'map-chip';
                chip.innerText = m.baslik;
                chip.onclick = () => {
                    document.querySelectorAll('.map-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    loader.style.display = 'none';
                    img.src = m.url;
                    img.style.display = 'block';
                    // Tıklanan çipi merkeze kaydır (Scroll UX)
                    chip.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                };
                container.appendChild(chip);
            });
        }

        // 3. MOBİL DİKEY KRONOLOJİ (UX OPTİMİZE)
        function renderTimeline() {
            const root = document.getElementById('vertical-timeline');
            
            // Verileri yıl bazlı topla
            let events = [...atlasData.kronoloji];
            atlasData.kategoriler.forEach(cat => {
                cat.liste.forEach(item => {
                    let yearMatch = item.ad.match(/\d{3,4}/);
                    if(yearMatch) events.push({ yil: yearMatch[0], olay: item.ad.split('(')[0].trim(), ozet: item.ozet });
                });
            });
            events.sort((a,b) => a.yil - b.yil);

            events.forEach(ev => {
                const item = document.createElement('div');
                item.className = 't-item';
                item.innerHTML = `
                    <div class="t-dot"></div>
                    <span class="t-year">${ev.yil}</span>
                    <div class="t-card">
                        <h4>${ev.olay}</h4>
                        <p>${ev.ozet.substring(0, 80)}...</p>
                    </div>
                `;
                root.appendChild(item);
            });
        }

        // 4. İÇERİK KARTLARI (TAM EKRAN GENİŞLİK)
        function renderContent() {
            const root = document.getElementById('content-root');
            atlasData.kategoriler.forEach(kat => {
                kat.liste.forEach(l => {
                    const card = document.createElement('div');
                    card.className = 'm-card';
                    card.setAttribute('data-search', (l.ad + l.ozet).toLowerCase());
                    card.innerHTML = `
                        <h3>${l.ad}</h3>
                        <p>${l.ozet}</p>
                    `;
                    root.appendChild(card);
                });
            });
        }

        // 5. MOBİL ARAMA (REAL-TIME)
        function handleSearch() {
            const input = document.getElementById('mobile-search');
            const noRes = document.getElementById('no-res');

            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                let count = 0;

                document.querySelectorAll('.m-card').forEach(card => {
                    const match = card.getAttribute('data-search').includes(val);
                    card.style.display = match ? 'block' : 'none';
                    if(match) count++;
                });

                noRes.style.display = count === 0 ? 'block' : 'none';
            });
        }

        // 6. TEMA YÖNETİMİ
        function handleTheme() {
            const btn = document.getElementById('theme-trigger');
            btn.onclick = () => {
                document.body.classList.toggle('light-mode');
                btn.innerText = document.body.classList.contains('light-mode') ? "☀️" : "🌙";
            };
        }

        // 7. ALT NAVİGASYON AKTİF DURUMU
        function updateNav(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // BAŞLAT
        startMobileApp();

    </script>
</body>
</html>
