<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeniyet Atlası | Gençliğin Dijital Rahlesi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. DEĞİŞKENLER VE TEMELLER
        ========================================= */
        :root {
            --gold: #c5a059;
            --gold-bright: #e2c286;
            --bg-dark: #0a0a0a;
            --bg-card: #151515;
            --text-main: #f0f0f0;
            --text-dim: #b0b0b0;
            --accent: rgba(197, 160, 89, 0.15);
            --nav-height: 70px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body.light-mode {
            --bg-dark: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #444444;
            --accent: rgba(197, 160, 89, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* =========================================
           2. NAVİGASYON (LOGO VE KULÜP ADI)
        ========================================= */
        .header {
            position: fixed; top: 0; width: 100%; height: var(--nav-height);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            z-index: 2000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
        }
        
        body.light-mode .header { background: rgba(248, 249, 250, 0.95); }

        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-img { 
            width: 48px; height: 48px; border-radius: 50%; 
            border: 2px solid var(--gold); padding: 2px;
            box-shadow: 0 0 15px var(--accent);
        }
        .logo-text-wrap { display: flex; flex-direction: column; }
        .logo-text { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.1rem; letter-spacing: 1px; line-height: 1; }
        .club-text { font-size: 0.65rem; color: var(--text-main); letter-spacing: 1px; margin-top: 4px; font-weight: 300; }

        .nav-desktop { display: none; }
        @media (min-width: 1024px) {
            .nav-desktop { display: flex; gap: 25px; }
            .nav-link { 
                color: var(--text-main); text-decoration: none; font-family: 'Cinzel'; 
                font-size: 0.85rem; transition: var(--transition);
            }
            .nav-link:hover { color: var(--gold); transform: translateY(-2px); }
        }

        .theme-toggle {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 6px 12px; border-radius: 20px; cursor: pointer;
            font-size: 1.1rem; transition: var(--transition);
        }
        .theme-toggle:hover { background: var(--gold); color: #000; }

        /* =========================================
           3. ARAMA MOTORU ÜNİTESİ
        ========================================= */
        .search-hero {
            margin-top: var(--nav-height);
            padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            text-align: center;
        }
        
        .search-wrap { 
            max-width: 700px; margin: 30px auto 0; position: relative;
        }
        .main-input {
            width: 100%; padding: 18px 30px; border-radius: 50px;
            border: 2px solid var(--gold); background: rgba(255,255,255,0.1);
            color: #fff; font-size: 1.1rem; backdrop-filter: blur(5px);
            transition: var(--transition);
        }
        .main-input:focus { outline: none; box-shadow: 0 0 25px var(--accent); background: rgba(0,0,0,0.6); }

        /* =========================================
           4. HARİTA PANELİ (AKTİF GELİR)
        ========================================= */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 10px; }
        .section-header p { color: var(--text-dim); max-width: 600px; margin: 0 auto; }

        .map-control-panel {
            background: var(--bg-card); border: 1px solid var(--gold);
            border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .map-tabs { 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px;
            border-bottom: 1px solid var(--accent); padding-bottom: 20px;
        }
        .map-tab-btn {
            padding: 10px 20px; background: transparent; border: 1px solid var(--accent);
            color: var(--gold); border-radius: 8px; cursor: pointer; font-weight: 600;
            transition: var(--transition); font-size: 0.9rem;
        }
        .map-tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 4px 12px var(--accent); }

        .map-viewer-box {
            position: relative; border-radius: 10px; overflow: hidden;
            background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center;
        }
        #main-map-img { max-width: 100%; height: auto; transition: opacity 0.5s ease; }

       /* =========================================
           5. MERKEZİ KRONOLOJİ (ZOOM VE ZIG-ZAG)
        ========================================= */
        .chronology-section { 
            background: var(--accent); 
            padding: 80px 0; 
            overflow: hidden; 
            position: relative;
        }
        
        /* Zoom Butonları */
        .zoom-overlay {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            display: flex; gap: 8px; align-items: center;
        }
        .z-btn {
            background: var(--bg-card); border: 1px solid var(--gold); color: var(--gold);
            width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
        }
        .z-btn:hover { background: var(--gold); color: #000; }

        .timeline-viewport {
            overflow-x: auto; padding: 250px 0; cursor: grab;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            position: relative; height: 600px;
        }
        .timeline-viewport::-webkit-scrollbar { display: none; }
        
        .timeline-container { 
            position: absolute; top: 50%; height: 6px; background: var(--gold); 
            border-radius: 3px; transition: width 0.2s ease-out;
        }
        
        .ruler-year {
            position: absolute; top: 18px; transform: translateX(-50%);
            font-size: 0.75rem; color: var(--gold); font-weight: bold; white-space: nowrap;
        }
        .ruler-month {
            position: absolute; top: 32px; transform: translateX(-50%);
            font-size: 0.6rem; color: var(--text-dim); opacity: 0.7; white-space: nowrap;
        }

        .timeline-item {
            position: absolute; width: 220px; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        .timeline-item.up { bottom: 12px; flex-direction: column; }
        .timeline-item.down { top: 12px; flex-direction: column-reverse; }

        .timeline-card {
            background: var(--bg-card); border: 2px solid var(--gold); padding: 12px;
            border-radius: 12px; cursor: pointer; transition: var(--transition);
            width: 100%; box-shadow: 0 8px 25px rgba(0,0,0,0.4); z-index: 10;
        }
        .timeline-card:hover { transform: scale(1.05); background: var(--gold); color: #000; }
        .timeline-card:hover * { color: #000 !important; }
        .timeline-card h4 { color: var(--gold); margin-bottom: 5px; font-size: 0.85rem; }
        .year-badge { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 0.7rem; }
        
        .long-desc { max-height: 0; overflow: hidden; transition: 0.4s; font-size: 0.75rem; color: var(--text-dim); }
        .timeline-item.active .long-desc { max-height: 200px; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px; }

        .connector-line { width: 2px; background: var(--gold); opacity: 0.5; }
        
           6. BİLGİ KARTLARI VE FOOTER
        ========================================= */
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 30px; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .grid-layout { grid-template-columns: repeat(3, 1fr); } }

        .atlas-card {
            background: var(--bg-card); border-radius: 20px; padding: 30px;
            border: 1px solid var(--accent); position: relative; overflow: hidden;
            transition: var(--transition);
        }
        .atlas-card:hover { border-color: var(--gold); transform: translateY(-8px); }
        .atlas-card h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.4rem; margin-bottom: 15px; }
        .atlas-card p { font-size: 0.95rem; color: var(--text-dim); line-height: 1.7; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--accent); color: var(--text-dim); font-size: 0.8rem; letter-spacing: 1px; }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-section">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="logo-img" alt="Logo">
            <div class="logo-text-wrap">
                <h1 class="logo-text">MEDENİYET ATLASI</h1>
                <span class="club-text">Çü İyiliğin Geleceği Kulübü</span>
            </div>
        </div>
        <nav class="nav-desktop">
            <a href="#map-section" class="nav-link">HAVZALAR</a>
            <a href="#chrono-section" class="nav-link">KRONOLOJİ</a>
            <a href="#content-section" class="nav-link">BİLGİNLER</a>
        </nav>
        <button id="theme-btn" class="theme-toggle">🌙</button>
    </header>

    <section class="search-hero">
        <h2 style="font-family:'Cinzel'; color:var(--gold); font-size:2.2rem;">HÜLASA-İ MEDENİYET</h2>
        <div class="search-wrap">
            <input type="text" id="master-search" class="main-input" placeholder="Tarih, isim veya eser arayın...">
        </div>
    </section>

    <section id="map-section" class="container">
        <div class="section-header">
            <h2>Medeniyet Havzaları</h2>
            <p>Tarihi sınırları interaktif haritalar üzerinden keşfedin.</p>
        </div>
        <div class="map-control-panel">
            <div id="map-tabs-container" class="map-tabs"></div>
            <div class="map-viewer-box">
                <img id="main-map-img" src="" alt="Atlas Haritası">
            </div>
        </div>
    </section>

<section id="chrono-section" class="chronology-section">
        <div class="section-header"><h2>Zamanın Ruhu</h2></div>
        
        <div class="zoom-overlay">
            <span style="color:var(--gold); font-size:0.65rem;">CTRL + SCROLL</span>
            <button class="z-btn" onclick="adjustZoom(1.4)">+</button>
            <button class="z-btn" onclick="adjustZoom(0.7)">-</button>
        </div>

        <div class="timeline-viewport" id="swipe-area">
            <div id="timeline-rail" class="timeline-container">
                </div>
        </div>
    </section>

    <section id="content-section" class="container">
        <div id="dynamic-content-root"></div>
        <div id="no-data-msg" style="text-align:center; display:none; color:var(--gold);">Sonuç bulunamadı.</div>
    </section>

    <footer>© 2026 ÇÜ İYİLİĞİN GELECEĞİ KULÜBÜ - DİJİTAL ENVANTER</footer>

    <script>
        const ATLAS_API = "https://api.npoint.io/c55382ed5004a784e99b";
        let rawData = null;

        async function bootApp() {
            try {
                const response = await fetch(ATLAS_API + "?nocache=" + Date.now());
                rawData = await response.json();
                
                initMaps();
                initChronology();
                initCategories();
                initSearch();
                initTheme();
                initDragScroll();
            } catch (e) { console.error("Hata:", e); }
        }

        // 1. HARİTALAR (İLKİ AKTİF)
        function initMaps() {
            const tabs = document.getElementById('map-tabs-container');
            const mapImg = document.getElementById('main-map-img');

            rawData.harita_gorselleri.forEach((m, index) => {
                const btn = document.createElement('button');
                btn.className = `map-tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = m.baslik;
                if(index === 0) mapImg.src = m.url;

                btn.onclick = () => {
                    document.querySelectorAll('.map-tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    mapImg.style.opacity = '0';
                    setTimeout(() => { mapImg.src = m.url; mapImg.style.opacity = '1'; }, 200);
                };
                tabs.appendChild(btn);
            });
        }

        // 2. KRONOLOJİ (ZIG-ZAG VE MERKEZİ CETVEL)
      let currentZoom = 100; // Başlangıç genişliği (px/yıl)
        const START_Y = 571, END_Y = 2026;

        function initChronology() {
            const rail = document.getElementById('timeline-rail');
            const view = document.getElementById('swipe-area');
            rail.innerHTML = '';
            
            rail.style.width = (END_Y - START_Y) * currentZoom + "px";

            // 1. Cetvel (Yıllar ve Yakınlaşınca Aylar)
            for (let y = START_Y; y <= END_Y; y++) {
                const x = (y - START_Y) * currentZoom;
                
                // Yıl Etiketi
                const label = document.createElement('div');
                label.className = 'ruler-year';
                label.style.left = x + "px";
                label.innerText = y;
                rail.appendChild(label);

                // Zoom 500px üzerindeyse ayları göster
                if (currentZoom > 500) {
                    for (let m = 1; m <= 11; m++) {
                        const mx = x + (m * (currentZoom / 12));
                        const mLabel = document.createElement('div');
                        mLabel.className = 'ruler-month';
                        mLabel.style.left = mx + "px";
                        mLabel.innerText = m + ". Ay";
                        rail.appendChild(mLabel);
                    }
                }
            }

            // 2. Olaylar
            let allEvents = [...rawData.kronoloji];
            allEvents.sort((a,b) => a.yil - b.yil);

            allEvents.forEach((ev, i) => {
                // Ay bilgisi varsa x konumunu daha hassas hesapla
                const ayShift = ev.ay ? (ev.ay - 1) * (currentZoom / 12) : 0;
                const x = (ev.yil - START_Y) * currentZoom + ayShift;
                const side = (i % 2 === 0) ? 'up' : 'down';
                
                const item = document.createElement('div');
                item.className = `timeline-item ${side}`;
                item.style.left = x + "px";
                
                item.innerHTML = `
                    <div class="timeline-card" onclick="this.parentElement.classList.toggle('active')">
                        <span class="year-badge">${ev.yil} ${ev.ay ? '/ '+ev.ay+'. Ay' : ''}</span>
                        <h4>${ev.olay}</h4>
                        <div class="long-desc">${ev.ozet || ''}</div>
                    </div>
                    <div class="connector-line" style="height:60px"></div>
                `;
                rail.appendChild(item);
            });
        }

        // YENİ: Zoom Fonksiyonu
        function adjustZoom(factor) {
            const view = document.getElementById('swipe-area');
            const oldZoom = currentZoom;
            currentZoom = Math.max(60, Math.min(3000, currentZoom * factor));
            
            const center = view.scrollLeft + view.offsetWidth / 2;
            const newScroll = (center / oldZoom) * currentZoom - view.offsetWidth / 2;
            
            initChronology(); // Cetveli tekrar çiz
            view.scrollLeft = newScroll;
        }

        // YENİ: Tekerlek Zoom Dinleyicisi
        document.getElementById('swipe-area').addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                adjustZoom(e.deltaY > 0 ? 0.8 : 1.2);
            }
        });

            // Olayları Topla
            let allEvents = [...rawData.kronoloji];
            rawData.kategoriler.forEach(k => {
                k.liste.forEach(item => {
                    let year = item.ad.match(/\d{3,4}/);
                    if(year) allEvents.push({yil: parseInt(year[0]), olay: item.ad.split('(')[0].trim(), ozet: item.ozet});
                });
            });
            allEvents.sort((a,b) => a.yil - b.yil);

            const lastXAtLevel = { up: [], down: [] };

            allEvents.forEach((ev, i) => {
                const x = (ev.yil - startYear) * gap;
                // Sırayla bir yukarı bir aşağı vererek dikey çakışmayı azalt
                const side = (i % 2 === 0) ? 'up' : 'down'; 
                
                // Kendi tarafında (up veya down) derinlik katmanı bul
                let level = 0;
                while(lastXAtLevel[side][level] && lastXAtLevel[side][level] > x - 250) level++;
                lastXAtLevel[side][level] = x + 250;

                const vDist = 50 + (level * 120); // Dikey mesafe artırıldı
                const item = document.createElement('div');
                item.className = `timeline-item ${side}`;
                item.style.left = x + "px";
                
                item.innerHTML = `
                    <div class="timeline-card" onclick="this.parentElement.classList.toggle('active')">
                        <span class="year-badge">${ev.yil}</span>
                        <h4>${ev.olay}</h4>
                        <div class="long-desc">${ev.ozet}</div>
                    </div>
                    <div class="connector-line" style="height:${vDist}px"></div>
                `;
                rail.appendChild(item);
            });
        }

        // 3. KATEGORİ VE KARTLAR
        function initCategories() {
            const root = document.getElementById('dynamic-content-root');
            rawData.kategoriler.forEach(kat => {
                const section = document.createElement('section');
                section.className = 'cat-block';
                section.innerHTML = `
                    <div class="section-header" style="margin-top:60px;"><h2>${kat.baslik}</h2></div>
                    <div class="grid-layout">
                        ${kat.liste.map(l => `
                            <div class="atlas-card" data-search="${l.ad.toLowerCase()} ${l.ozet.toLowerCase()}">
                                <h3>${l.ad}</h3>
                                <p>${l.ozet}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                root.appendChild(section);
            });
        }

        // 4. ARAMA MOTORU
        function initSearch() {
            const input = document.getElementById('master-search');
            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                document.querySelectorAll('.atlas-card').forEach(card => {
                    card.style.display = card.dataset.search.includes(val) ? 'block' : 'none';
                });
                document.querySelectorAll('.timeline-item').forEach(item => {
                    item.style.opacity = item.innerText.toLowerCase().includes(val) ? "1" : "0.1";
                });
            });
        }

        // 5. TEMA VE KAYDIRMA
        function initTheme() {
            const btn = document.getElementById('theme-btn');
            btn.onclick = () => {
                document.body.classList.toggle('light-mode');
                btn.innerText = document.body.classList.contains('light-mode') ? "☀️" : "🌙";
            };
        }

        function initDragScroll() {
            const slider = document.getElementById('swipe-area');
            let isDown = false, startX, scrollLeft;
            slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
            slider.addEventListener('mouseup', () => isDown = false);
            slider.addEventListener('mouseleave', () => isDown = false);
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const walk = (e.pageX - slider.offsetLeft - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        }

        bootApp();
    </script>
</body>
</html>
