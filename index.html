<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gençliđin Dijital Rahlesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --ana: #0d0d0d; --altin: #c5a059; --kart: #1a1a1a; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--ana); color: white; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Giriţ Ekraný */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070'); background-size: cover; background-position: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(1.2rem, 7vw, 3rem); color: var(--altin); margin: 0 20px; letter-spacing: 3px; line-height: 1.2; }
        
        /* Mobil Menü */
        .nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 30px; width: 90%; max-width: 500px; }
        .nav-link { padding: 12px; border: 1px solid var(--altin); color: white; text-decoration: none; font-size: 0.75rem; border-radius: 5px; transition: 0.3s; background: rgba(197, 160, 89, 0.05); }
        .nav-link:hover { background: var(--altin); color: var(--ana); }

        /* Bölüm Ayarlarý */
        .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        h2 { font-family: 'Cinzel', serif; color: var(--altin); text-align: center; border-bottom: 1px solid var(--altin); padding-bottom: 15px; margin-bottom: 40px; font-size: 1.5rem; }

        /* Harita Tasarýmý */
        #map { height: 350px; border-radius: 15px; border: 1px solid var(--altin); margin: 20px 0; z-index: 1; }

        /* Kronoloji Tasarýmý */
        .timeline { border-left: 2px solid var(--altin); margin-left: 10px; padding: 10px 20px; }
        .t-item { position: relative; margin-bottom: 40px; padding-left: 20px; }
        .t-item::before { content: ''; position: absolute; left: -31px; top: 0; width: 18px; height: 18px; background: var(--altin); border-radius: 50%; box-shadow: 0 0 10px var(--altin); }
        .t-yil { color: var(--altin); font-weight: bold; font-size: 1.1rem; }

        /* Bilgi Kartlarý */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--kart); padding: 25px; border-radius: 12px; border-top: 4px solid var(--altin); box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { color: var(--altin); margin-top: 0; font-family: 'Cinzel', serif; font-size: 1.1rem; }
        .card p { font-size: 0.9rem; line-height: 1.6; color: #ddd; }

        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="main-title">GENÇLÝĐÝN DÝJÝTAL RAHLESÝ</h1>
        <div class="nav">
            <a href="#map-sec" class="nav-link">COĐRAFYA</a>
            <a href="#time-sec" class="nav-link">KRONOLOJÝ</a>
            <a href="#sahsiyetler" class="nav-link">ŢAHSÝYETLER</a>
            <a href="#kitaplar" class="nav-link">KÝTAPLAR</a>
        </div>
    </div>

    <div id="map-sec" class="section">
        <h2>DÜŢÜNCE COĐRAFYASI</h2>
        <div id="map"></div>
    </div>

    <div id="time-sec" class="section">
        <h2>ZAMAN ÇÝZELGESÝ</h2>
        <div id="timeline" class="timeline"></div>
    </div>

    <div id="dynamic-content"></div>

    <footer>
        &copy; 2026 - Ýslam Düţünce Atlasý Temelli Eđitim Projesi
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Senin npoint URL'n
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";

        async function rahleBaslat() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // 1. Baţlýk ve Arka Plan
                document.getElementById('main-title').innerText = data.site_ayarlari.baslik;

                // 2. Harita Fonksiyonu
                const map = L.map('map').setView([35, 45], 3);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: 'OpenStreetMap'
                }).addTo(map);

                data.harita_noktalari.forEach(nokta => {
                    L.marker([nokta.lat, nokta.lng]).addTo(map)
                        .bindPopup(`<b>${nokta.ad}</b><br>${nokta.bilgi}`);
                });

                // 3. Kronoloji Fonksiyonu
                const timeContainer = document.getElementById('timeline');
                data.kronoloji.forEach(item => {
                    timeContainer.innerHTML += `
                        <div class="t-item">
                            <div class="t-yil">${item.yil}</div>
                            <div class="t-olay">${item.olay}</div>
                        </div>
                    `;
                });

                // 4. Ţahsiyetler ve Kitaplar Kartlarý
                const contentArea = document.getElementById('dynamic-content');
                data.kategoriler.forEach(kat => {
                    let cardsHTML = kat.liste.map(item => `
                        <div class="card">
                            <h3>${item.ad}</h3>
                            <p>${item.ozet || item.detay}</p>
                        </div>
                    `).join('');

                    contentArea.innerHTML += `
                        <div id="${kat.id}" class="section">
                            <h2>${kat.baslik}</h2>
                            <div class="grid">${cardsHTML}</div>
                        </div>
                    `;
                });

            } catch (hata) {
                console.error("Hata:", hata);
                document.getElementById('main-title').innerText = "Veri Yüklenemedi!";
            }
        }

        // Baţlat
        window.onload = rahleBaslat;
    </script>
</body>
</html>
