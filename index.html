<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gençliğin Dijital Rahlesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --ana: #0d0d0d; --altin: #c5a059; --kart: #1a1a1a; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--ana); color: white; scroll-behavior: smooth; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1542831371-29b0f74f9713'); background-size: cover; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--altin); padding: 0 20px; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .nav-link { padding: 12px 25px; border: 1px solid var(--altin); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; background: rgba(0,0,0,0.5); }
        .section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; min-height: 400px; }
        h2 { font-family: 'Cinzel', serif; color: var(--altin); text-align: center; border-bottom: 2px solid var(--altin); padding-bottom: 10px; }
        #map { height: 400px; border-radius: 10px; border: 1px solid var(--altin); margin-top: 20px; }
        .timeline { border-left: 2px solid var(--altin); padding-left: 20px; margin: 20px 10px; }
        .t-item { margin-bottom: 30px; position: relative; }
        .t-item::before { content: '●'; position: absolute; left: -29px; color: var(--altin); font-size: 20px; }
        .t-yil { color: var(--altin); font-weight: bold; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--kart); padding: 25px; border-radius: 10px; border-top: 4px solid var(--altin); }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="main-title">YÜKLENİYOR...</h1>
        <div class="nav">
            <a href="#map-sec" class="nav-link">COĞRAFYA</a>
            <a href="#time-sec" class="nav-link">KRONOLOJİ</a>
            <a href="#sahsiyetler" class="nav-link">ŞAHSİYETLER</a>
            <a href="#kitaplar" class="nav-link">KİTAPLAR</a>
        </div>
    </div>

    <div id="map-sec" class="section">
        <h2>DÜŞÜNCE COĞRAFYASI</h2>
        <div id="map"></div>
    </div>

    <div id="time-sec" class="section">
        <h2>ZAMAN ÇİZELGESİ</h2>
        <div id="timeline" class="timeline"></div>
    </div>

    <div id="dynamic-content"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";

        async function baslat() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // 1. Başlık
                document.getElementById('main-title').innerText = data.site_ayarlari.baslik;

                // 2. Harita (Boş kalmaması için)
                const map = L.map('map').setView([35, 45], 3);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                if(data.harita_noktalari) {
                    data.harita_noktalari.forEach(n => {
                        L.marker([n.lat, n.lng]).addTo(map).bindPopup(`<b>${n.ad}</b><br>${n.bilgi}`);
                    });
                }

                // 3. Kronoloji (Boş kalmaması için)
                const tl = document.getElementById('timeline');
                if(data.kronoloji) {
                    data.kronoloji.forEach(k => {
                        tl.innerHTML += `<div class="t-item"><div class="t-yil">${k.yil}</div><div>${k.olay}</div></div>`;
                    });
                }

                // 4. Şahsiyetler ve Kitaplar (ID eşleşmesi için)
                const dc = document.getElementById('dynamic-content');
                if(data.kategoriler) {
                    data.kategoriler.forEach(kat => {
                        let kartlar = kat.liste.map(i => `
                            <div class="card">
                                <h3>${i.ad}</h3>
                                <p>${i.ozet}</p>
                            </div>
                        `).join('');
                        
                        dc.innerHTML += `
                            <div id="${kat.id}" class="section">
                                <h2>${kat.baslik}</h2>
                                <div class="grid">${kartlar}</div>
                            </div>
                        `;
                    });
                }

            } catch (err) {
                console.error("Hata:", err);
                document.getElementById('main-title').innerText = "BAĞLANTI HATASI!";
            }
        }

        window.onload = baslat;
    </script>
</body>
</html>
