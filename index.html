<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medeniyet Atlası</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #ffd700;
    --text-dim: #999;
  }
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #fff;
    color: #222;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
  }
  .logo-section {
    display: flex;
    align-items: center;
  }
  .logo-img {
    width: 50px;
    height: 50px;
  }
  .logo-text {
    margin: 0 10px;
    font-size: 1.2rem;
    font-weight: bold;
  }
  nav.nav-desktop {
    display: flex;
    gap: 15px;
  }
  .nav-link {
    text-decoration: none;
    color: inherit;
    font-weight: bold;
  }
  #theme-btn {
    font-size: 1.2rem;
    background: none;
    border: none;
    cursor: pointer;
  }
  /* Haritalar bölümü */
  #map-section {
    padding: 20px;
  }
  #map-tabs-container {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    overflow-x: auto;
  }
  .map-tab-btn {
    padding: 8px 12px;
    background: var(--gold);
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .map-tab-btn.active {
    outline: 2px solid #222;
  }
  #main-map-img {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    transition: opacity 0.3s;
  }

  /* Kronoloji bölümü */
  #chrono-section {
    position: relative;
    padding: 20px;
  }
  #timeline-rail {
    position: relative;
    height: 200px;
    width: 100%;
    border-top: 2px solid #ccc;
    overflow-x: auto;
    display: flex;
    align-items: flex-end;
  }
  .timeline-item {
    position: absolute;
    bottom: 0;
    cursor: pointer;
  }
  .timeline-card {
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    box-shadow: 0 0 4px rgba(0,0,0,0.2);
    max-width: 220px;
    font-size: 0.8rem;
  }
  .year-badge {
    background: var(--gold);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 0.75rem;
  }
  .short-info {
    display: block;
    margin-top: 4px;
  }
  .long-desc {
    display: none;
    margin-top: 4px;
  }
  .timeline-card.active + .long-desc {
    display: block;
  }
  .connector-line {
    width: 2px;
    background: #999;
    margin: 0 auto;
  }
  /* Yıllar cetveli */
  #year-line {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
    overflow-x: auto;
    padding: 0 10px;
  }
  #year-line div {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo-section" style="display:flex; align-items:center;">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="logo-img" alt="Medeniyet Atlası" />
    <div style="display:flex; flex-direction:column; align-items:center; margin-left:10px;">
      <h1 class="logo-text">MEDENİYET ATLASI</h1>
      <span style="color:var(--gold); font-family:'Cinzel', serif; font-size:0.9rem;">Çü İyiliğin Geleceği Kulübü</span>
    </div>
  </div>
  <nav class="nav-desktop">
    <a href="#map-section" class="nav-link">COĞRAFYA</a>
    <a href="#chrono-section" class="nav-link">KRONOLOJİ</a>
    <a href="#content-section" class="nav-link">BİLGİNLER</a>
    <a href="#arch-section" class="nav-link">MİMARİ</a>
  </nav>
  <button id="theme-btn" class="theme-toggle">🌙</button>
</header>

<!-- Haritalar Bölümü -->
<section id="map-section" style="padding:20px;">
  <h2>Haritalar</h2>
  <div id="map-tabs-container"></div>
  <div id="map-placeholder" style="position:relative;">
    <img id="main-map-img" src="" alt="Harita" style="display:none;" />
  </div>
</section>

<!-- Kronoloji Bölümü -->
<section id="chrono-section" style="padding:20px;">
  <h2>KronoLOJİ</h2>
  <div id="timeline-rail"></div>
</section>

<!-- Yıllar Cetveli -->
<div id="year-line"></div>

<script>
  // Örnek veri
  const rawData = {
    harita_gorselleri: [
      { baslik: "Klasik Dönem Haritası", url: "https://via.placeholder.com/800x400?text=Klasik+Dönem" },
      { baslik: "Ortaçağ Haritası", url: "https://via.placeholder.com/800x400?text=Ortaçağ" },
      { baslik: "Yeni Dönem Haritası", url: "https://via.placeholder.com/800x400?text=Yeni+Dönem" }
    ],
    kronoloji: [
      { ad: "Başlangıç 571", ozet: "Yıl 571 başlangıcı" },
      { ad: "575: İlk medeniyetler", ozet: "İlk medeniyetler ortaya çıkıyor" },
      { ad: "600: Devletler kuruluyor", ozet: "Birçok devlet kuruluyor" },
      { ad: "700: İpek yolu", ozet: "Ticaret ve kültür yolu" },
      { ad: "800: Ortaçağ", ozet: "Ortaçağ karanlık dönemi" }
    ],
    kategoriler: [
      {
        kategori: "Dönemler",
        liste: [
          { ad: "Klasik Dönem (500-1500)", ozet: "Klasik dönem olayları" },
          { ad: "Ortaçağ (500-1500)", ozet: "Ortaçağ olayları" }
        ]
      }
    ]
  };

  // Haritalar Sekmesi
  function initMaps() {
    const tabsContainer = document.getElementById('map-tabs-container');
    const mapImg = document.getElementById('main-map-img');
    const placeholder = document.getElementById('map-placeholder');

    const defaultHarita = rawData.harita_gorselleri.find(h => h.baslik.toLowerCase().includes('klasik')) || rawData.harita_gorselleri[0];

    // Başlangıç haritası
    mapImg.src = defaultHarita.url;
    mapImg.style.display = 'block';

    rawData.harita_gorselleri.forEach((m, index) => {
      const btn = document.createElement('button');
      btn.className = 'map-tab-btn';
      btn.innerText = m.baslik;
      if (m === defaultHarita) btn.classList.add('active');
      btn.onclick = () => {
        document.querySelectorAll('.map-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        placeholder.style.display = 'none';
        mapImg.src = m.url;
        mapImg.style.opacity = '0';
        setTimeout(() => { mapImg.style.opacity = '1'; }, 50);
      };
      tabsContainer.appendChild(btn);
    });
  }

  // Kronoloji
  function initChronology() {
    const rail = document.getElementById('timeline-rail');
    const startYear = 571;
    const endYear = 2030;
    const step = window.innerWidth < 768 ? 55 : 85;
    let allEvents = [...rawData.kronoloji];

    rawData.kategoriler.forEach(k => {
      k.liste.forEach(item => {
        const match = item.ad.match(/\d{3,4}/);
        if (match) {
          const y = parseInt(match[0]);
          if (y >= startYear && y <= endYear) {
            allEvents.push({ yil: y, olay: item.ad.split('(')[0].trim(), ozet: item.ozet });
          }
        }
      });
    });
    allEvents.sort((a, b) => a.yil - b.yil);

    // Timeline genişliği
    const width = (endYear - startYear) * step;
    rail.style.width = width + 'px';

    // Çakışma önleme
    const layerHistory = [];
    allEvents.forEach(ev => {
      const x = (ev.yil - startYear) * step;
      let layer = 0;
      while (layerHistory[layer]?.some(s => x < s.end && x + 220 > s.start)) layer++;
      if (!layerHistory[layer]) layerHistory[layer] = [];
      layerHistory[layer].push({ start: x, end: x + 220 });
      const verticalDist = 50 + (layer * 110);
      const item = document.createElement('div');
      item.className = 'timeline-item';
      item.style.left = x + 'px';
      item.style.bottom = '0';
      item.innerHTML = `
        <div class="timeline-card" onclick="this.parentElement.classList.toggle('active')">
          <span class="year-badge">${ev.yil}</span>
          <span class="short-info">${ev.olay}</span>
          <div class="long-desc">${ev.ozet}</div>
        </div>
        <div class="connector-line" style="height:${verticalDist}px"></div>`;
      item.style.transform = `translate(-50%, -${verticalDist}px)`;
      rail.appendChild(item);
    });

    // Yıllar cetveli
    const cetvel = document.getElementById('year-line');
    for (let y = startYear; y <= endYear; y++) {
      const yDiv = document.createElement('div');
      yDiv.innerText = y;
      cetvel.appendChild(yDiv);
    }
  }

  // Başlatma
  initMaps();
  initChronology();

  // Tema değiştirme
  document.getElementById('theme-btn').onclick = () => {
    document.body.classList.toggle('dark-theme');
  };
</script>
</body>
</html>
