<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Rahle | Medeniyet Atlası</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ana: #0a0a0a; --altin: #c5a059; --kart: #161616;
            --hadise-bg: #2c3e50; --bilgin-bg: #7f8c8d; --mimari-bg: #218c74; --kurum-bg: #4b4b7b;
        }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: white; scroll-behavior: smooth;
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.96)), 
                        url('https://png.pngtree.com/thumb_back/fw800/background/20250915/pngtree-ornate-islamic-architectural-masterpiece-image_19365187.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        /* === ZOOM VE KONTROL PANELİ === */
        .timeline-controls {
            position: sticky; left: 20px; top: 20px; z-index: 100;
            display: flex; gap: 10px; padding: 10px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--altin); border-radius: 8px; width: fit-content; margin: 0 auto 20px;
        }
        .zoom-btn { background: var(--altin); border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* === DOĞRUSAL ZAMAN HATTI === */
        .timeline-wrapper {
            padding: 150px 0; background: rgba(255,255,255,0.02);
            overflow-x: auto; cursor: grab; position: relative; min-height: 500px;
        }

        .timeline-rail {
            position: relative; height: 400px; border-bottom: 4px solid var(--altin);
            margin: 0 100px; transition: width 0.3s ease;
        }

        .time-node {
            position: absolute; bottom: -8px; width: 16px; height: 16px;
            background: var(--altin); border-radius: 50%; transform: translateX(-50%); z-index: 10;
            border: 2px solid white;
        }

        .time-box {
            position: absolute; width: 200px; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 5;
        }

        .box-content {
            padding: 12px; border-radius: 8px; font-size: 0.75rem; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Kategori Renkleri */
        .tip-hadise { background: var(--hadise-bg); }
        .tip-bilgin { background: var(--bilgin-bg); }
        .tip-mimari { background: var(--mimari-bg); }
        .tip-kurum  { background: var(--kurum-bg); }

        .box-content::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            width: 1px; background: var(--altin); opacity: 0.5;
        }

        .box-year { font-weight: bold; font-family: 'Cinzel'; display: block; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.2); }

        /* DİĞER STANDART BÖLÜMLER */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .site-logo { max-width: 100px; margin-bottom: 20px; }
        h1 { font-family: 'Cinzel', serif; color: var(--altin); margin: 0; font-size: 2.2rem; }
        .section { padding: 40px 20px; }
        h2 { font-family: 'Cinzel', serif; color: var(--altin); text-align: center; border-bottom: 2px solid var(--altin); display: inline-block; padding-bottom: 10px; margin-bottom: 30px; }
        .center-wrap { text-align: center; }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFgSfhr0O_CKwwH2X164gcADRQIVdlDuo01SjVbM0CwDeCUVxSUfO3TydSR6XviMXb8a_AlxLMgOdFDV6dSj1ZkARnMoYM&s&ec=121585077" class="site-logo">
        <h1 id="main-title">DİJİTAL RAHLE</h1>
    </div>

    <div class="center-wrap">
        <h2>MEDENİYET ZAMAN ŞERİDİ</h2>
    </div>

    <div class="timeline-controls">
        <button class="zoom-btn" onclick="adjustZoom(1.5)">+</button>
        <span style="font-size: 12px; align-self: center;">YAKINLAŞTIR</span>
        <button class="zoom-btn" onclick="adjustZoom(0.7)">-</button>
    </div>

    <div class="timeline-wrapper" id="scroll-area">
        <div class="timeline-rail" id="rail">
            </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";
        let currentZoom = 20; // Yıl başına düşen piksel
        let timelineData = [];

        async function yukle() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();
                document.getElementById('main-title').innerText = data.site_ayarlari.baslik;

                // Tüm verileri (hadise, bilgin, kurum, mimari) tek bir listede topla
                let combined = [...data.kronoloji.map(k => ({...k, tip: "hadise"}))];
                
                data.kategoriler.forEach(kat => {
                    kat.liste.forEach(item => {
                        // Yıl bilgisini ayıkla: "İmam Azam (v. 767)" -> 767
                        let yilMatch = item.ad.match(/\d+/);
                        if(yilMatch) {
                            combined.push({
                                yil: yilMatch[0],
                                olay: item.ad,
                                tip: kat.id.replace('sahsiyetler', 'bilgin').replace('mimari', 'mimari').replace('kurumlar', 'kurum')
                            });
                        }
                    });
                });

                timelineData = combined.sort((a,b) => parseInt(a.yil) - parseInt(b.yil));
                renderTimeline();

            } catch (e) { console.error("Yükleme hatası:", e); }
        }

        function renderTimeline() {
            const rail = document.getElementById('rail');
            rail.innerHTML = '';
            const startYear = 571;
            const endYear = 2030;
            
            rail.style.width = (endYear - startYear) * currentZoom + "px";

            const slots = {};

            timelineData.forEach(k => {
                const yil = parseInt(k.yil);
                const position = (yil - startYear) * currentZoom;
                
                let slotLevel = 0;
                while(slots[yil + "_" + slotLevel]) { slotLevel++; }
                slots[yil + "_" + slotLevel] = true;

                const box = document.createElement('div');
                box.className = 'time-box';
                box.style.left = position + "px";
                const h = 40 + (slotLevel * 100);
                box.style.bottom = h + "px";

                box.innerHTML = `
                    <div class="box-content tip-${k.tip}">
                        <span class="box-year">${k.yil}</span>
                        ${k.olay}
                    </div>
                    <div class="time-node"></div>
                    <div style="position:absolute; bottom:-${h}px; left:50%; width:1px; height:${h}px; background:var(--altin); opacity:0.3; z-index:1;"></div>
                `;
                rail.appendChild(box);
            });
        }

        function adjustZoom(factor) {
            currentZoom *= factor;
            if(currentZoom < 5) currentZoom = 5;
            if(currentZoom > 200) currentZoom = 200;
            renderTimeline();
        }

        // Mouse Sürükleme
        const slider = document.getElementById('scroll-area');
        let isDown = false, startX, scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; slider.scrollLeft = scrollLeft - (x - startX) * 2; });

        window.onload = yukle;
    </script>
</body>
</html>
