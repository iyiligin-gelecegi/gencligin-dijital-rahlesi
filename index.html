<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeniyet Atlası v3.0 | Dijital Rahle</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 
           =========================================
           1. CORE ENGINE & DESIGN TOKENS
           ========================================= 
        */
        :root {
            --neon-gold: #ffca28;
            --deep-gold: #c5a059;
            --glow: 0 0 20px rgba(197, 160, 89, 0.4);
            --bg-black: #050505;
            --bg-glass: rgba(20, 20, 20, 0.8);
            --text-silver: #e0e0e0;
            --nav-h: 90px;
            --ease-out: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.light-mode {
            --bg-black: #f0f0f0;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-silver: #1a1a1a;
            --deep-gold: #a67c00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-silver);
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Arka Plan Animasyonu */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(197, 160, 89, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* 
           =========================================
           2. NAVIGATION (CYBER-PUNK STYLE)
           ========================================= 
        */
        .header-cyber {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            height: 70px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--deep-gold);
            border-radius: 50px;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: var(--glow);
            animation: slideDown 1s var(--ease-out);
        }

        @keyframes slideDown {
            from { top: -100px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }

        .logo-wrap { display: flex; align-items: center; gap: 15px; }
        .logo-ring {
            width: 45px; height: 45px;
            border: 2px dashed var(--neon-gold);
            border-radius: 50%;
            padding: 2px;
            animation: rotateRing 10s linear infinite;
        }
        @keyframes rotateRing { to { transform: rotate(360deg); } }

        .logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .logo-text h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #fff, var(--neon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-trigger {
            background: none; border: 1px solid var(--deep-gold);
            color: var(--neon-gold); width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .theme-trigger:hover { background: var(--neon-gold); color: #000; box-shadow: var(--glow); }

        /* 
           =========================================
           3. INTERACTIVE MAPS (LENS EFFECT)
           ========================================= 
        */
        .map-section {
            padding: 140px 5% 60px;
            text-align: center;
        }

        .map-glare-box {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid var(--deep-gold);
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: 0.5s;
        }

        .map-glare-box:hover { transform: scale(1.02) rotateX(2deg); }

        #main-map-img {
            width: 100%;
            height: auto;
            min-height: 400px;
            object-fit: contain;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(0.8) contrast(1.2);
        }

        .map-nav-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .map-chip {
            padding: 12px 25px;
            background: var(--bg-glass);
            border: 1px solid var(--deep-gold);
            border-radius: 15px;
            color: var(--neon-gold);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .map-chip.active {
            background: var(--neon-gold);
            color: #000;
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        /* 
           =========================================
           4. CHRONOLOGY (THE INFINITE FLOW)
           ========================================= 
        */
        .chrono-container {
            position: relative;
            background: linear-gradient(to bottom, transparent, #111, transparent);
            padding: 100px 0;
            margin: 80px 0;
        }

        .viewport-layer {
            width: 100%;
            height: 600px;
            overflow-x: auto;
            cursor: grab;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .viewport-layer::-webkit-scrollbar { display: none; }

        .time-rail {
            position: absolute;
            top: 50%;
            height: 6px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--neon-gold) 20%, 
                var(--neon-gold) 80%, 
                transparent 100%);
            transform: translateY(-50%);
            box-shadow: 0 0 15px var(--deep-gold);
        }

        /* Zaman Cetveli */
        .tick-mark {
            position: absolute;
            top: 50%;
            width: 2px;
            height: 20px;
            background: rgba(197, 160, 89, 0.5);
            transform: translateY(-50%);
        }

        .tick-label {
            position: absolute;
            top: 30px;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-gold);
        }

        /* Event Cards */
        .chrono-node {
            position: absolute;
            width: 300px;
            transform: translateX(-50%);
            z-index: 50;
            transition: 0.5s var(--ease-out);
        }

        .chrono-node.up { bottom: 60px; }
        .chrono-node.down { top: 60px; flex-direction: column-reverse; display: flex; }

        .node-card {
            background: var(--bg-glass);
            border: 2px solid var(--deep-gold);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.4s;
            overflow: hidden;
            position: relative;
        }

        .node-card:hover {
            border-color: #fff;
            transform: translateY(-10px) scale(1.05);
            box-shadow: var(--glow);
        }

        .node-card h3 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--neon-gold);
            font-size: 1rem;
            margin: 10px 0;
        }

        .badge-year {
            background: var(--neon-gold);
            color: #000;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
        }

        /* Expandable Content (Özet Bölümü) */
        .node-summary {
            max-height: 0;
            opacity: 0;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            color: #fff;
            font-size: 0.85rem;
            line-height: 1.5;
            padding-top: 0;
        }

        .chrono-node.active .node-summary {
            max-height: 300px;
            opacity: 1;
            padding-top: 15px;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* Peygamber Efendimiz (sav) Özel Animasyon */
        .prophet-node .node-card {
            border: 3px solid #fff;
            animation: holyGlow 3s ease-in-out infinite;
        }

        @keyframes holyGlow {
            0%, 100% { box-shadow: 0 0 20px #fff; }
            50% { box-shadow: 0 0 50px var(--neon-gold); }
        }

        .connector-cyber {
            width: 3px;
            height: 60px;
            background: linear-gradient(to bottom, var(--neon-gold), transparent);
            margin: 0 auto;
        }

        .chrono-node.down .connector-cyber {
            background: linear-gradient(to top, var(--neon-gold), transparent);
        }

        /* 
           =========================================
           5. SEARCH & KNOWLEDGE GRID
           ========================================= 
        */
        .search-engine {
            padding: 40px 5%;
            text-align: center;
        }

        .cyber-input {
            width: 100%;
            max-width: 700px;
            padding: 20px 40px;
            background: var(--bg-glass);
            border: 2px solid var(--deep-gold);
            border-radius: 100px;
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            transition: 0.4s;
        }

        .cyber-input:focus {
            outline: none;
            box-shadow: var(--glow);
            width: 80%;
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 40px 5%;
        }

        .knowledge-card {
            background: var(--bg-glass);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            transition: 0.5s var(--ease-out);
            position: relative;
            overflow: hidden;
        }

        .knowledge-card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .knowledge-card:hover {
            transform: translateY(-15px) rotateZ(1deg);
            border-color: var(--neon-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .knowledge-card:hover::after { left: 100%; }

        .knowledge-card h2 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--neon-gold);
            margin-bottom: 15px;
        }

        /* 
           =========================================
           6. ZOOM CONTROLS
           ========================================= 
        */
        .float-controls {
            position: fixed;
            bottom: 40px; right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .btn-round {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--neon-gold);
            border: none;
            color: #000;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-round:hover { transform: scale(1.1) rotate(90deg); }

        /* Mobil Duyarlılık */
        @media (max-width: 768px) {
            .header-cyber { height: 60px; padding: 0 15px; }
            .logo-text h1 { font-size: 0.9rem; }
            .map-chip { font-size: 0.6rem; padding: 10px 15px; }
            .chrono-node { width: 220px; }
            .knowledge-grid { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body class="dark-mode">

    <!-- Navigasyon -->
    <header class="header-cyber">
        <div class="logo-wrap">
            <div class="logo-ring">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" class="logo-img" alt="Logo">
            </div>
            <div class="logo-text">
                <h1>MEDENİYET ATLASI</h1>
            </div>
        </div>
        <button class="theme-trigger" id="theme-btn">🌙</button>
    </header>

    <!-- Harita Bölümü -->
    <section class="map-section">
        <h2 style="font-family:'Cinzel Decorative'; color:var(--neon-gold); margin-bottom:30px; letter-spacing:5px;">STRATEJİK HAVZALAR</h2>
        <div class="map-nav-grid" id="map-tabs"></div>
        <div class="map-glare-box">
            <img id="main-map-img" src="" alt="Yükleniyor...">
        </div>
    </section>

    <!-- Arama Bölümü -->
    <section class="search-engine">
        <input type="text" class="cyber-input" id="master-search" placeholder="GEÇMİŞE BİR PENCERE AÇIN...">
    </section>

    <!-- Kronoloji Ünitesi -->
    <div class="chrono-container">
        <div class="viewport-layer" id="viewport">
            <div class="time-rail" id="rail">
                <!-- JS ile dolacak -->
            </div>
        </div>
    </div>

    <!-- Bilgi Kartları -->
    <section class="knowledge-grid" id="knowledge-root"></section>

    <!-- Sabit Kontroller -->
    <div class="float-controls">
        <button class="btn-round" onclick="changeZoom(1.2)">+</button>
        <button class="btn-round" onclick="changeZoom(0.8)">-</button>
    </div>

    <!-- 
       =========================================
       7. JAVASCRIPT: THE BRAIN
       ========================================= 
    -->
    <script>
        const ATLAS_API = "https://api.npoint.io/c55382ed5004a784e99b";
        let data = null;
        let zoom = 100; // Yıl başına düşen piksel
        const START = 571;
        const END = 2026;

        // Uygulamayı Başlat
        async function init() {
            try {
                const response = await fetch(ATLAS_API + "?t=" + Date.now());
                data = await response.json();
                
                renderMaps();
                renderChrono();
                renderKnowledge();
                initDrag();
                initSearch();
                initTheme();
            } catch (e) {
                console.error("Atlas yüklenemedi: ", e);
            }
        }

        // 1. Harita Mantığı (Gelişmiş)
        function renderMaps() {
            const container = document.getElementById('map-tabs');
            const img = document.getElementById('main-map-img');
            
            data.harita_gorselleri.forEach((m, i) => {
                const chip = document.createElement('div');
                chip.className = `map-chip ${i === 0 ? 'active' : ''}`;
                chip.innerText = m.baslik;
                
                if(i===0) img.src = m.url;

                chip.onclick = () => {
                    document.querySelectorAll('.map-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    img.style.opacity = '0';
                    img.style.transform = 'scale(0.95) rotateY(10deg)';
                    
                    setTimeout(() => {
                        img.src = m.url;
                        img.style.opacity = '1';
                        img.style.transform = 'scale(1) rotateY(0deg)';
                    }, 400);
                };
                container.appendChild(chip);
            });
        }

        // 2. Kronoloji Mantığı (Sonsuz Kaydırma + Her Sene)
        function renderChrono() {
            const rail = document.getElementById('rail');
            rail.innerHTML = '';
            
            const totalWidth = (END - START) * zoom;
            rail.style.width = (totalWidth + window.innerWidth) + "px";

            // Zaman Çizgileri
            for (let y = START; y <= END; y++) {
                const x = (y - START) * zoom;
                
                // Tick
                if (zoom > 40 || y % 10 === 0) {
                    const tick = document.createElement('div');
                    tick.className = 'tick-mark';
                    tick.style.left = x + "px";
                    rail.appendChild(tick);
                }

                // Yıl Etiketi
                if ( (zoom < 50 && y % 50 === 0) || (zoom >= 50 && y % 10 === 0) ) {
                    const label = document.createElement('div');
                    label.className = 'tick-label';
                    label.style.left = x + "px";
                    label.innerText = y;
                    rail.appendChild(label);
                }
            }

            // Olaylar
            let events = [...(data.kronoloji || [])];
            events.sort((a,b) => a.yil - b.yil);

            events.forEach((ev, i) => {
                const x = (ev.yil - START) * zoom;
                const side = (i % 2 === 0) ? 'up' : 'down';
                const isProphet = ev.yil === 571;

                const node = document.createElement('div');
                node.className = `chrono-node ${side} ${isProphet ? 'prophet-node' : ''}`;
                node.style.left = x + "px";
                node.style.animation = `fadeInUp 0.5s ease forwards ${i * 0.1}s`;

                node.innerHTML = `
                    <div class="node-card" onclick="toggleNode(this)">
                        <span class="badge-year">${ev.yil}</span>
                        <h3>${ev.olay}</h3>
                        <div class="node-summary">${ev.ozet || 'Bu dönem hakkında detaylı arşiv kaydı bekleniyor...'}</div>
                    </div>
                    <div class="connector-cyber"></div>
                `;
                rail.appendChild(node);
            });
        }

        function toggleNode(card) {
            const node = card.parentElement;
            const isActive = node.classList.contains('active');
            
            document.querySelectorAll('.chrono-node').forEach(n => n.classList.remove('active'));
            if(!isActive) node.classList.add('active');
        }

        // 3. Bilgi Grid
        function renderKnowledge() {
            const root = document.getElementById('knowledge-root');
            data.kategoriler.forEach(kat => {
                kat.liste.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'knowledge-card';
                    card.innerHTML = `
                        <h2>${item.ad}</h2>
                        <p style="color:var(--text-silver); opacity:0.8;">${item.ozet}</p>
                    `;
                    root.appendChild(card);
                });
            });
        }

        // 4. Zoom Kontrol
        function changeZoom(factor) {
            const oldZoom = zoom;
            zoom = Math.max(15, Math.min(500, zoom * factor));
            renderChrono();
        }

        // 5. Kaydırma Motoru (Drag)
        function initDrag() {
            const v = document.getElementById('viewport');
            let isDown = false;
            let startX, sLeft;

            v.addEventListener('mousedown', (e) => {
                isDown = true;
                v.style.cursor = 'grabbing';
                startX = e.pageX - v.offsetLeft;
                sLeft = v.scrollLeft;
            });
            v.addEventListener('mouseleave', () => isDown = false);
            v.addEventListener('mouseup', () => isDown = false);
            v.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const x = e.pageX - v.offsetLeft;
                v.scrollLeft = sLeft - (x - startX) * 2;
            });

            // Mouse wheel zoom
            v.addEventListener('wheel', (e) => {
                if (e.ctrlKey) {
                    e.preventDefault();
                    e.deltaY < 0 ? changeZoom(1.1) : changeZoom(0.9);
                }
            }, {passive: false});
        }

        // 6. Arama Motoru
        function initSearch() {
            const input = document.getElementById('master-search');
            input.oninput = (e) => {
                const val = e.target.value.toLowerCase();
                
                // Kartları filtrele
                document.querySelectorAll('.knowledge-card').forEach(c => {
                    c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
                });

                // Kronolojiyi filtrele (şeffaflık ile)
                document.querySelectorAll('.chrono-node').forEach(n => {
                    n.style.opacity = n.innerText.toLowerCase().includes(val) ? '1' : '0.1';
                });
            };
        }

        // 7. Tema Yönetimi
        function initTheme() {
            const btn = document.getElementById('theme-btn');
            btn.onclick = () => {
                document.body.classList.toggle('light-mode');
                btn.innerText = document.body.classList.contains('light-mode') ? "☀️" : "🌙";
            };
        }

        // Başlat
        init();

    </script>
</body>
</html>
