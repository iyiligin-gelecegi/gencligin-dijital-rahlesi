<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Rahle | Medeniyet Atlası</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ana: #0a0a0a; --altin: #c5a059;
            --hadise-bg: #2c3e50; --bilgin-bg: #4b4b4b; --mimari-bg: #1e3d33; --kurum-bg: #3d3d5e;
        }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: white;
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.96)), 
                        url('https://png.pngtree.com/thumb_back/fw800/background/20250915/pngtree-ornate-islamic-architectural-masterpiece-image_19365187.webp');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        .timeline-controls {
            position: sticky; left: 50%; transform: translateX(-50%); top: 20px; z-index: 100;
            display: flex; gap: 15px; padding: 10px 20px; background: rgba(10,10,10,0.9);
            border: 1px solid var(--altin); border-radius: 50px; width: fit-content;
        }
        .zoom-btn { background: var(--altin); border: none; width: 35px; height: 35px; cursor: pointer; border-radius: 50%; font-size: 1.2rem; }

        .timeline-wrapper {
            padding-top: 450px; padding-bottom: 150px;
            background: rgba(255,255,255,0.02); overflow-x: auto; cursor: grab; position: relative;
        }

        .timeline-rail { position: relative; height: 4px; background: var(--altin); margin: 0 200px; transition: width 0.4s; }

        .time-box {
            position: absolute; width: 220px; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 5;
            transition: all 0.4s ease;
        }

        /* === TIKLANABİLİR İÇERİK KUTUSU === */
        .box-content {
            padding: 10px 15px; border-radius: 10px; font-size: 0.8rem; color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); position: relative;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; overflow: hidden; max-height: 80px; /* Kapalıyken yükseklik */
            transition: max-height 0.5s ease, width 0.3s ease;
            width: 200px;
        }

        /* Tıklanınca açılan hal */
        .box-content.expanded {
            max-height: 500px; /* İçeriğe göre genişler */
            width: 280px; 
            z-index: 100;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.5);
        }

        .details-text {
            display: none; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.75rem; color: #eee; line-height: 1.5;
            text-align: left;
        }

        .box-content.expanded .details-text { display: block; }

        /* Kategori Renkleri */
        .tip-hadise { background: var(--hadise-bg); border-bottom: 3px solid #3498db; }
        .tip-bilgin { background: var(--bilgin-bg); border-bottom: 3px solid var(--altin); }
        .tip-mimari { background: var(--mimari-bg); border-bottom: 3px solid #2ecc71; }
        .tip-kurum  { background: var(--kurum-bg); border-bottom: 3px solid #9b59b6; }

        .box-line { position: absolute; left: 50%; width: 1px; background: var(--altin); opacity: 0.3; pointer-events: none; }
        .time-node { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #fff; border: 2px solid var(--altin); border-radius: 50%; }
        .box-year { font-weight: bold; font-family: 'Cinzel'; display: block; color: var(--altin); }

        .hero { padding: 40px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--altin); }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="main-title">DİJİTAL RAHLE</h1>
        <p style="color:#888;">Başlıklara tıklayarak detaylı bilgiyi görebilirsiniz.</p>
    </div>

    <div class="timeline-controls">
        <button class="zoom-btn" onclick="adjustZoom(1.4)">+</button>
        <button class="zoom-btn" onclick="adjustZoom(0.7)">-</button>
    </div>

    <div class="timeline-wrapper" id="scroll-area">
        <div class="timeline-rail" id="rail"></div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";
        let currentZoom = 30;
        let timelineData = [];

        async function yukle() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();
                
                // Verileri (hadise, bilgin, mimari, kurum) birleştirme ve özetlerini ekleme
                let combined = data.kronoloji.map(k => ({yil: k.yil, olay: k.olay, ozet: k.olay, tip: "hadise"}));
                
                data.kategoriler.forEach(kat => {
                    kat.liste.forEach(item => {
                        let yilMatch = item.ad.match(/\d+/);
                        if(yilMatch) {
                            combined.push({
                                yil: parseInt(yilMatch[0]),
                                olay: item.ad.split('(')[0].trim(), // İsmi temizle
                                ozet: item.ozet,
                                tip: kat.id.replace('sahsiyetler', 'bilgin').replace('mimari', 'mimari').replace('kurumlar', 'kurum')
                            });
                        }
                    });
                });

                timelineData = combined.sort((a,b) => a.yil - b.yil);
                renderTimeline();
            } catch (e) { console.error(e); }
        }

        function renderTimeline() {
            const rail = document.getElementById('rail');
            rail.innerHTML = '';
            const startYear = 571;
            rail.style.width = (2030 - startYear) * currentZoom + "px";

            const occupiedSlots = [];

            timelineData.forEach(k => {
                const xPos = (k.yil - startYear) * currentZoom;
                const boxWidth = 220; 

                let level = 0;
                let foundSlot = false;
                while (!foundSlot) {
                    const isOverlap = occupiedSlots[level]?.some(r => xPos < r.end && xPos + boxWidth > r.start);
                    if (!isOverlap) {
                        if (!occupiedSlots[level]) occupiedSlots[level] = [];
                        occupiedSlots[level].push({ start: xPos, end: xPos + boxWidth });
                        foundSlot = true;
                    } else { level++; }
                }

                const bottomDist = 40 + (level * 100);
                const box = document.createElement('div');
                box.className = 'time-box';
                box.style.left = xPos + "px";
                box.style.bottom = bottomDist + "px";

                box.innerHTML = `
                    <div class="box-content tip-${k.tip}" onclick="toggleExpand(this)">
                        <span class="box-year">${k.yil}</span>
                        <span class="box-title">${k.olay}</span>
                        <div class="details-text">${k.ozet}</div>
                    </div>
                    <div class="time-node"></div>
                    <div class="box-line" style="height: ${bottomDist}px; bottom: -${bottomDist}px;"></div>
                `;
                rail.appendChild(box);
            });
        }

        function toggleExpand(el) {
            // Diğer tüm açık kutuları kapat (isteğe bağlı)
            document.querySelectorAll('.box-content.expanded').forEach(openBox => {
                if(openBox !== el) openBox.classList.remove('expanded');
            });
            // Tıklananı aç/kapat
            el.classList.toggle('expanded');
        }

        function adjustZoom(f) {
            currentZoom *= f;
            currentZoom = Math.min(Math.max(currentZoom, 10), 300);
            renderTimeline();
        }

        const slider = document.getElementById('scroll-area');
        let isDown = false, startX, scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => { 
            if(!isDown) return; 
            e.preventDefault();
            slider.scrollLeft = scrollLeft - (e.pageX - startX) * 2; 
        });

        window.onload = yukle;
    </script>
</body>
</html>
