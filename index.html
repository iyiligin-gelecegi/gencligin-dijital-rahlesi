<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Rahle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --ana: #0d0d0d; --altin: #c5a059; --kart: #1a1a1a; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--ana); color: white; scroll-behavior: smooth; }
        
        /* Arka Plan ve Karartma */
        .hero { 
            height: 70vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://png.pngtree.com/thumb_back/fw800/background/20250915/pngtree-ornate-islamic-architectural-masterpiece-image_19365187.webp'); 
            background-size: cover; 
            background-position: center; 
            border-bottom: 2px solid var(--altin);
        }
        
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--altin); padding: 0 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* Menü Düzeni */
        .nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; padding: 0 15px; max-width: 600px; }
        .nav-link { padding: 12px; border: 1px solid var(--altin); color: white; text-decoration: none; border-radius: 5px; font-size: 0.75rem; text-align: center; background: rgba(0,0,0,0.6); font-weight: bold; transition: 0.3s; }
        .nav-link:hover { background: var(--altin); color: var(--ana); }

        .section { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        h2 { font-family: 'Cinzel', serif; color: var(--altin); text-align: center; border-bottom: 2px solid var(--altin); padding-bottom: 12px; margin-bottom: 30px; }

        /* Harita Alanı */
        .map-selector { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; margin-bottom: 20px; }
        .map-btn { padding: 10px 18px; background: var(--kart); border: 1px solid var(--altin); color: var(--altin); border-radius: 25px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; font-weight: bold; }
        
        #map-display-container { width: 100%; border: 1px solid var(--altin); border-radius: 10px; overflow: hidden; background: #000; min-height: 250px; position: relative; }
        #map-display { width: 100%; display: none; cursor: zoom-in; }
        
        .placeholder-text { padding: 60px; text-align: center; color: #666; font-style: italic; }

        /* Kronoloji */
        .timeline { border-left: 3px solid var(--altin); padding-left: 25px; margin: 30px 10px; }
        .t-item { margin-bottom: 35px; position: relative; }
        .t-item::before { content: '●'; position: absolute; left: -34px; color: var(--altin); font-size: 1.3rem; top: -2px; }
        
        /* Kartlar */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; }
        .card { background: var(--kart); padding: 25px; border-radius: 10px; border-top: 5px solid var(--altin); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        h3 { color: var(--altin); margin-top: 0; font-family: 'Cinzel', serif; }
        
        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .nav { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="main-title">YÜKLENİYOR...</h1>
        <div class="nav">
            <a href="#map-sec" class="nav-link">HARİTALAR</a>
            <a href="#time-sec" class="nav-link">ZAMAN TÜNELİ</a>
            <a href="#sahsiyetler" class="nav-link">BİLGİNLER</a>
            <a href="#kurumlar" class="nav-link">KURUMLAR</a>
            <a href="#sehirler" class="nav-link">ŞEHİRLER</a>
            <a href="#mimari" class="nav-link">MİMARİ</a>
        </div>
    </div>

    <div id="map-sec" class="section">
        <h2>DÜŞÜNCE HARİTALARI</h2>
        <div class="map-selector" id="map-buttons"></div>
        <div id="map-display-container">
            <div id="placeholder" class="placeholder-text">Lütfen yukarıdan bir harita seçiniz (Büyütmek için üzerine tıklayın).</div>
            <img id="map-display" src="" alt="Atlas Haritası">
        </div>
    </div>

    <div id="time-sec" class="section">
        <h2>ZAMAN ÇİZELGESİ</h2>
        <div id="timeline" class="timeline"></div>
    </div>

    <div id="dynamic-content"></div>

    <script src="https://cdn.jsdelivr.net/npm/medium-zoom/dist/medium-zoom.min.js"></script>

    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";
        
        const zoom = mediumZoom('#map-display', {
            margin: 24,
            background: '#0d0d0d'
        });

        async function yukle() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();

                document.getElementById('main-title').innerText = data.site_ayarlari.baslik;

                const btnContainer = document.getElementById('map-buttons');
                const mapImg = document.getElementById('map-display');
                const placeholder = document.getElementById('placeholder');

                data.harita_gorselleri.forEach(gorsel => {
                    const btn = document.createElement('button');
                    btn.className = 'map-btn';
                    btn.innerText = gorsel.baslik;
                    btn.onclick = () => {
                        placeholder.style.display = 'none';
                        mapImg.src = gorsel.url;
                        mapImg.style.display = 'block';
                        zoom.detach();
                        zoom.attach(mapImg);
                        mapImg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };
                    btnContainer.appendChild(btn);
                });

                const tl = document.getElementById('timeline');
                data.kronoloji.forEach(k => {
                    tl.innerHTML += `<div class="t-item"><b style="color:var(--altin); font-size:1.1rem;">${k.yil}</b><br>${k.olay}</div>`;
                });

                const dc = document.getElementById('dynamic-content');
                data.kategoriler.forEach(kat => {
                    let kartlar = kat.liste.map(i => `
                        <div class="card">
                            <h3>${i.ad}</h3>
                            <p style="color:#ccc; font-size:0.9rem; line-height:1.6;">${i.ozet}</p>
                        </div>
                    `).join('');
                    
                    dc.innerHTML += `
                        <div id="${kat.id}" class="section">
                            <h2>${kat.baslik}</h2>
                            <div class="grid">${kartlar}</div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Hata:", err);
            }
        }

        window.onload = yukle;
    </script>
</body>
</html>
