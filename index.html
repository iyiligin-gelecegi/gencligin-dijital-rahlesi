<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeniyet Atlası v5</title>

<style>
:root{
  --gold:#d4af37;
  --bg:#050505;
  --card:#111;
  --text:#fff;
  --muted:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  padding:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  z-index:10;
}

/* HERO */
.hero{
  padding:60px 20px;
}
.hero h1{
  font-size:2rem;
}
.hero span{color:var(--gold);}

/* SECTION */
.section{
  padding:25px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:18px;
  padding:15px;
  margin-bottom:12px;
}

/* TIMELINE */
.timeline{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:10px 0;
}
.event{
  min-width:200px;
}

/* MAP */
.map{
  width:100%;
  height:300px;
  border-radius:20px;
  background:#000;
  position:relative;
  overflow:hidden;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* BUTTON */
.map-btn{
  margin:5px;
  padding:8px 12px;
  background:#222;
  color:var(--gold);
  border:none;
  border-radius:10px;
}

/* SHEET */
.sheet{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:80%;
  background:#111;
  border-radius:25px 25px 0 0;
  padding:20px;
  transition:.4s;
  overflow:auto;
}
.sheet.open{
  bottom:0;
}

/* FAB */
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--gold);
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}
</style>
</head>

<body>

<div class="header"><b>Medeniyet Atlası</b></div>

<section class="hero">
  <h1>Geçmişin <span>Bilgisi</span><br>Geleceğin İyiliği</h1>
</section>

<section class="section">
  <h2>Kategoriler</h2>
  <div id="categories"></div>
</section>

<section class="section">
  <h2>Zaman Tüneli</h2>
  <div id="timeline" class="timeline"></div>
</section>

<section class="section">
  <h2>Haritalar</h2>
  <div id="map" class="map">
    <canvas id="draw"></canvas>
  </div>
  <div id="mapBtns"></div>
</section>

<div id="sheet" class="sheet">
  <h2 id="sheetTitle"></h2>
  <p id="sheetContent"></p>
</div>

<div class="fab" onclick="clearCanvas()">✕</div>

<script>
const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";

let DATA = [];
let RAW = null;

/* =========================
   LOAD DATA
========================= */
async function loadData(){
  try{
    const res = await fetch(API_URL);
    RAW = await res.json();

    normalizeData();
    renderTimeline();
    renderCategories();
    renderMaps();

  }catch(e){
    console.error(e);
  }
}

/* =========================
   NORMALIZE (FULL DATA)
========================= */
function normalizeData(){
  let all = [];

  // kronoloji
  RAW.kronoloji.forEach(ev=>{
    all.push({
      year: ev.yil,
      title: ev.olay,
      desc: ev.ozet,
      type: "kronoloji"
    });
  });

  // kategoriler
  RAW.kategoriler.forEach(cat=>{
    cat.liste.forEach(item=>{
      let y = item.ad.match(/\d{3,4}/);
      if(y){
        all.push({
          year: parseInt(y[0]),
          title: item.ad,
          desc: item.ozet,
          type: cat.baslik
        });
      }
    });
  });

  all.sort((a,b)=>a.year - b.year);
  DATA = all;
}

/* =========================
   TIMELINE
========================= */
function renderTimeline(){
  const timeline = document.getElementById("timeline");

  DATA.forEach(ev=>{
    const el = document.createElement("div");
    el.className = "card event";

    el.innerHTML = `
      <b>${ev.year}</b>
      <p>${ev.title}</p>
      <small>${ev.type}</small>
    `;

    el.onclick = ()=>openSheet(ev);

    timeline.appendChild(el);
  });
}

/* =========================
   CATEGORIES
========================= */
function renderCategories(){
  const container = document.getElementById("categories");

  RAW.kategoriler.forEach(cat=>{
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<b>${cat.baslik}</b>`;

    el.onclick = ()=>{
      openSheet({
        title: cat.baslik,
        desc: cat.aciklama || "Kategori bilgisi"
      });
    };

    container.appendChild(el);
  });
}

/* =========================
   MAPS
========================= */
function renderMaps(){
  const map = document.getElementById("map");
  const btns = document.getElementById("mapBtns");

  RAW.harita_gorselleri.forEach(m=>{
    const b = document.createElement("button");
    b.className = "map-btn";
    b.innerText = m.baslik;

    b.onclick = ()=>{
      map.style.backgroundImage = `url(${m.url})`;
      map.style.backgroundSize = "cover";
    };

    btns.appendChild(b);
  });
}

/* =========================
   SHEET
========================= */
const sheet = document.getElementById("sheet");

function openSheet(ev){
  sheet.classList.add("open");
  document.getElementById("sheetTitle").innerText = ev.title;
  document.getElementById("sheetContent").innerText = ev.desc;
}

/* =========================
   CANVAS DRAW
========================= */
const canvas = document.getElementById("draw");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = 300;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing=false;

canvas.addEventListener("touchstart",(e)=>{
  drawing=true;
  const t=e.touches[0];
  ctx.beginPath();
  ctx.moveTo(t.clientX, t.clientY);
});

canvas.addEventListener("touchmove",(e)=>{
  if(!drawing)return;
  const t=e.touches[0];
  ctx.lineTo(t.clientX, t.clientY);
  ctx.strokeStyle="gold";
  ctx.lineWidth=3;
  ctx.stroke();
});

canvas.addEventListener("touchend",()=>drawing=false);

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* =========================
   START
========================= */
loadData();
</script>

</body>
</html>
