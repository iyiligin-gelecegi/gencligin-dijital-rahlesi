<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medeniyet Atlası v4.0 | Geleceğin Arşivi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;600;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-gold: #ffca28;
            --deep-gold: #c5a059;
            --accent-cyan: #00f2ff;
            --bg-dark: #020205;
            --glass: rgba(15, 15, 25, 0.7);
            --border-glow: 0 0 15px rgba(255, 202, 40, 0.3);
            --font-main: 'Space Grotesk', sans-serif;
            --font-title: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Dinamik Arka Plan */
        #star-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* --- NAVIGASYON --- */
        .nav-os {
            position: fixed;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 202, 40, 0.2);
            border-radius: 20px;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo { 
            width: 40px; height: 40px; 
            border: 2px solid var(--neon-gold); 
            border-radius: 12px;
            rotate: 45deg;
            display: flex; align-items: center; justify-content: center;
        }
        .brand-logo img { rotate: -45deg; width: 80%; border-radius: 5px; }
        .brand-name { font-family: var(--font-title); font-weight: 900; font-size: 1rem; letter-spacing: 2px; color: var(--neon-gold); }

        /* --- HARİTA MODÜLÜ (MOBİL ODAKLI) --- */
        .map-universe {
            padding: 120px 20px 40px;
            text-align: center;
        }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            margin: 30px auto;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 25px;
            border: 2px solid var(--deep-gold);
            overflow: hidden;
            touch-action: none; /* Manuel Zoom İçin */
            box-shadow: var(--border-glow);
        }

        #map-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        .map-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .map-btn {
            background: var(--glass);
            border: 1px solid var(--deep-gold);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            font-family: var(--font-title);
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .map-btn.active { background: var(--neon-gold); color: #000; font-weight: bold; }

        /* --- KRONOLOJİ (GELİŞMİŞ MOTOR) --- */
        .timeline-portal {
            height: 500px;
            margin: 60px 0;
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #020205 0%, transparent 15%, transparent 85%, #020205 100%);
        }

        .time-track {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50vw;
            will-change: transform;
            cursor: grab;
        }

        .time-line-axis {
            position: absolute;
            top: 50%; left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-gold), var(--accent-cyan));
            box-shadow: 0 0 20px var(--neon-gold);
        }

        .event-node {
            position: absolute;
            min-width: 280px;
            transition: 0.4s var(--ease-out);
        }

        .event-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--neon-gold);
            padding: 20px;
            border-radius: 15px;
            position: relative;
            transform-origin: center;
        }

        .event-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-cyan);
            transform: scale(1.05) translateY(-5px);
        }

        .event-year {
            font-family: var(--font-title);
            font-weight: 900;
            color: var(--neon-gold);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 5px;
        }

        /* --- ARAMA VE BİLGİ --- */
        .search-zone { padding: 0 20px; max-width: 800px; margin: 0 auto; }
        .cyber-search {
            width: 100%;
            background: var(--glass);
            border: 2px solid var(--deep-gold);
            padding: 18px 30px;
            border-radius: 50px;
            color: #fff;
            font-family: var(--font-title);
            font-size: 1rem;
            text-align: center;
        }

        .grid-system {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 50px 5%;
        }

        .data-cube {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: 0.4s;
        }

        .data-cube:hover { border-color: var(--accent-cyan); transform: translateY(-10px); }

        /* Mobil Nav Alt */
        .mobile-dock {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(255,202,40,0.3);
            z-index: 2000;
        }

        .dock-tool { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #fff; }

        @media (max-width: 768px) {
            .event-node { min-width: 220px; }
            .brand-name { font-size: 0.8rem; }
            .timeline-portal { height: 400px; }
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <nav class="nav-os">
        <div class="brand">
            <div class="brand-logo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s" alt="Logo">
            </div>
            <div class="brand-name">MEDENİYET ATLASI v4.0</div>
        </div>
        <div id="status-tag" style="font-size: 0.6rem; color: var(--accent-cyan); font-family: 'Orbitron';">SYNC: OK</div>
    </nav>

    <section class="map-universe">
        <h2 style="font-family: 'Cinzel Decorative'; margin-bottom: 10px;">DİJİTAL KARTOGRAFİ</h2>
        <p style="opacity: 0.6; font-size: 0.8rem;">Haritayı kaydırmak ve büyütmek için dokunun.</p>
        
        <div class="map-container" id="map-frame">
            <img id="map-canvas" src="" alt="Yükleniyor...">
        </div>

        <div class="map-controls" id="map-selectors"></div>
    </section>

    <div class="search-zone">
        <input type="text" class="cyber-search" id="global-search" placeholder="ARŞİVDE ARA: örn. 'İstanbul' ">
    </div>

    <div class="timeline-portal" id="portal">
        <div class="time-track" id="track">
            <div class="time-line-axis" id="axis"></div>
            </div>
    </div>

    <div class="grid-system" id="knowledge-base"></div>

    <div class="mobile-dock">
        <button class="dock-tool" onclick="zoomTime(1.2)">➕</button>
        <button class="dock-tool" onclick="zoomTime(0.8)">➖</button>
        <button class="dock-tool" id="theme-swap">🌓</button>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/c55382ed5004a784e99b";
        let state = {
            data: null,
            zoom: 120, // yıl başına piksel
            isDragging: false,
            startX: 0,
            scrollLeft: 0,
            mapScale: 1,
            mapPos: {x: 0, y: 0}
        };

        async function startApp() {
            try {
                const res = await fetch(`${API_URL}?cache=${Math.random()}`);
                state.data = await res.json();
                
                initStars();
                renderMaps();
                renderTimeline();
                renderCards();
                initInteractions();
            } catch (err) {
                console.error("Sistem Hatası:", err);
            }
        }

        // --- ARKA PLAN YILDIZLAR ---
        function initStars() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const stars = Array.from({length: 200}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                v: Math.random() * 0.5
            }));

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                stars.forEach(s => {
                    s.y -= s.v;
                    if(s.y < 0) s.y = canvas.height;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- HARİTA MOTORU (DOKUNMATİK UYUMLU) ---
        function renderMaps() {
            const container = document.getElementById('map-selectors');
            const img = document.getElementById('map-canvas');
            
            state.data.harita_gorselleri.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `map-btn ${i===0 ? 'active' : ''}`;
                btn.innerText = m.baslik;
                btn.onclick = () => {
                    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    img.style.opacity = 0;
                    setTimeout(() => {
                        img.src = m.url;
                        img.style.opacity = 1;
                    }, 300);
                };
                container.appendChild(btn);
                if(i===0) img.src = m.url;
            });

            // Map Zoom & Pan (Basit sürüm)
            let mDown = false;
            let mStart = {x:0, y:0};
            img.addEventListener('touchstart', e => { mDown = true; mStart = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
            img.addEventListener('touchmove', e => {
                if(!mDown) return;
                const moveX = e.touches[0].clientX - mStart.x;
                img.style.transform = `translateX(${moveX}px) scale(1.5)`;
            });
            img.addEventListener('touchend', () => { mDown = false; setTimeout(() => img.style.transform = 'scale(1)', 1000); });
        }

        // --- KRONOLOJİ MOTORU ---
        function renderTimeline() {
            const track = document.getElementById('track');
            const startYear = 571;
            const endYear = 2026;
            
            track.innerHTML = '<div class="time-line-axis" id="axis"></div>';
            const axis = document.getElementById('axis');
            
            const totalWidth = (endYear - startYear) * state.zoom;
            axis.style.width = totalWidth + "px";

            state.data.kronoloji.sort((a,b) => a.yil - b.yil).forEach((ev, i) => {
                const pos = (ev.yil - startYear) * state.zoom;
                const node = document.createElement('div');
                node.className = 'event-node';
                node.style.left = `${pos}px`;
                node.style.top = i % 2 === 0 ? '15%' : '55%';

                node.innerHTML = `
                    <div class="event-card">
                        <span class="event-year">${ev.yil}</span>
                        <strong style="color:var(--accent-cyan)">${ev.olay}</strong>
                        <p style="font-size:0.8rem; margin-top:8px; display:none" class="details">${ev.ozet || ''}</p>
                    </div>
                `;

                node.onclick = () => {
                    const d = node.querySelector('.details');
                    d.style.display = d.style.display === 'none' ? 'block' : 'none';
                };

                track.appendChild(node);
            });
        }

        function zoomTime(f) {
            state.zoom = Math.max(30, Math.min(600, state.zoom * f));
            renderTimeline();
        }

        // --- İNTERAKSİYONLAR ---
        function initInteractions() {
            const portal = document.getElementById('portal');
            const track = document.getElementById('track');

            const startDrag = (e) => {
                state.isDragging = true;
                state.startX = (e.pageX || e.touches[0].pageX) - portal.offsetLeft;
                state.scrollLeft = portal.scrollLeft;
                track.style.cursor = 'grabbing';
            };

            const doDrag = (e) => {
                if (!state.isDragging) return;
                e.preventDefault();
                const x = (e.pageX || e.touches[0].pageX) - portal.offsetLeft;
                const walk = (x - state.startX) * 2;
                portal.scrollLeft = state.scrollLeft - walk;
            };

            portal.addEventListener('mousedown', startDrag);
            portal.addEventListener('mousemove', doDrag);
            portal.addEventListener('mouseup', () => state.isDragging = false);
            portal.addEventListener('touchstart', startDrag);
            portal.addEventListener('touchmove', doDrag);
            portal.addEventListener('touchend', () => state.isDragging = false);

            // Arama
            document.getElementById('global-search').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.data-cube, .event-node').forEach(el => {
                    const match = el.innerText.toLowerCase().includes(term);
                    el.style.display = match ? 'block' : 'none';
                    el.style.opacity = match ? 1 : 0.2;
                });
            };
        }

        function renderCards() {
            const base = document.getElementById('knowledge-base');
            state.data.kategoriler.forEach(cat => {
                cat.liste.forEach(item => {
                    const cube = document.createElement('div');
                    cube.className = 'data-cube';
                    cube.innerHTML = `
                        <h3 style="color:var(--neon-gold); font-family:'Orbitron'; font-size:0.9rem">${item.ad}</h3>
                        <p style="font-size:0.85rem; opacity:0.8; margin-top:10px">${item.ozet}</p>
                    `;
                    base.appendChild(cube);
                });
            });
        }

        window.onload = startApp;
    </script>
</body>
</html>
